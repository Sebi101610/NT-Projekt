<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earth Climate Simulation</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* Graph oben links */

#graphBox{
position:absolute;
top:10px;
left:10px;
width:320px;
height:200px;
background:white;
border-radius:8px;
padding:5px;
}

/* Weltraum Animation */

#spaceBox{
position:absolute;
top:10px;
right:10px;
width:320px;
height:200px;
}

/* Temperatur Anzeige */

#tempBox{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:20px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div id="graphBox">
<canvas id="chart"></canvas>
</div>

<div id="spaceBox"></div>

<div id="tempBox">Click on Earth</div>

<script src="script.js"></script>

</body>
</html>
