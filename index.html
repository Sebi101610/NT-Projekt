<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonne verschwindet Simulation</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#ui{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

button{
padding:10px 20px;
font-size:16px;
}

#graph{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
}

#space{
position:absolute;
top:10px;
right:10px;
width:320px;
height:220px;
background:black;
border:1px solid white;
}

#info{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="graph" width="300" height="150"></canvas>
<canvas id="space"></canvas>

<div id="info">
Temperatur: <span id="temp">15</span> °C
</div>

<div id="ui">
<button onclick="startSimulation()">Simulation starten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 3;   // WICHTIG → Erde sichtbar

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableZoom=true;

let light = new THREE.PointLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* ERDE */

let textureLoader = new THREE.TextureLoader();

let earthTexture = textureLoader.load(
"https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg"
);

let geometry = new THREE.SphereGeometry(1,64,64);

let material = new THREE.MeshPhongMaterial({
map:earthTexture
});

let earth = new THREE.Mesh(geometry,material);
scene.add(earth);

/* ROTER PUNKT */

let markerGeometry = new THREE.SphereGeometry(0.02,16,16);
let markerMaterial = new THREE.MeshBasicMaterial({color:"red"});
let marker = new THREE.Mesh(markerGeometry,markerMaterial);
scene.add(marker);

let selectedLat = null;
let selectedLon = null;

/* KLICK AUF GLOBUS */

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

renderer.domElement.addEventListener("click",(event)=>{

mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

raycaster.setFromCamera(mouse,camera);

let intersects = raycaster.intersectObject(earth);

if(intersects.length > 0){

let point = intersects[0].point.normalize();

selectedLat = Math.asin(point.y) * 180/Math.PI;
selectedLon = Math.atan2(point.x,point.z) * 180/Math.PI;

marker.position.copy(point.multiplyScalar(1.01));

updateTemperature();

}

});

/* TEMPERATUR */

let temp = 15;

function updateTemperature(){

if(!simulationRunning) return;

temp -= 0.02;

document.getElementById("temp").innerText = temp.toFixed(1);

updateGraph();

}

/* GRAPH */

let graphCanvas = document.getElementById("graph");
let g = graphCanvas.getContext("2d");

let data=[];

function updateGraph(){

data.push(temp);

g.clearRect(0,0,300,150);

g.beginPath();
g.moveTo(0,150-data[0]);

for(let i=1;i<data.length;i++){

g.lineTo(i*3,150-data[i]);

}

g.strokeStyle="red";
g.stroke();

}

/* SIMULATION */

let simulationRunning=false;

function startSimulation(){

simulationRunning=true;

}

function resetSimulation(){

simulationRunning=false;

temp=15;
data=[];

document.getElementById("temp").innerText=temp;

g.clearRect(0,0,300,150);

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate);

earth.rotation.y += 0.0005;

if(simulationRunning){

updateTemperature();

}

renderer.render(scene,camera);

}

animate();

/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
