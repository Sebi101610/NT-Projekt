<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Erde – iPad Version</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui {
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}
button {
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin:10px;
}
#sunBtn { background:orange; }
#resetBtn { background:gray; color:white; }
</style>
</head>
<body>

<div id="ui">
<button id="sunBtn">☀ Sonne ausschalten</button>
<button id="resetBtn">Reset</button>
</div>

<script>

// Szene
let scene = new THREE.Scene();

// Kamera
let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3;

// Renderer
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Touch-Steuerung
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.rotateSpeed = 0.5;
controls.enableZoom = false;

// Textur
let loader = new THREE.TextureLoader();
let earthTexture = loader.load(
  "https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/earthmap1k.jpg"
);

// Erde
let earthGeometry = new THREE.SphereGeometry(1, 64, 64);
let earthMaterial = new THREE.MeshPhongMaterial({ map: earthTexture });
let earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

// Atmosphäre
let atmosphereGeometry = new THREE.SphereGeometry(1.05, 64, 64);
let atmosphereMaterial = new THREE.MeshBasicMaterial({
  color: 0x3399ff,
  transparent: true,
  opacity: 0.2
});
let atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
scene.add(atmosphere);

// Licht
let ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

let sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
sunLight.position.set(5, 0, 5);
scene.add(sunLight);

// Sonne sichtbar
let sunGeometry = new THREE.SphereGeometry(0.3, 32, 32);
let sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
let sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
sunMesh.position.set(5, 0, 5);
scene.add(sunMesh);

// Sterne (weniger → besser für iPad)
let starGeometry = new THREE.BufferGeometry();
let starVertices = [];
for(let i=0;i<800;i++){
  starVertices.push(
    THREE.MathUtils.randFloatSpread(200),
    THREE.MathUtils.randFloatSpread(200),
    THREE.MathUtils.randFloatSpread(200)
  );
}
starGeometry.setAttribute(
  'position',
  new THREE.Float32BufferAttribute(starVertices,3)
);
let starMaterial = new THREE.PointsMaterial({color:0xffffff});
let stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Simulation
let sunGone = false;

document.getElementById("sunBtn").onclick = function(){
  sunGone = !sunGone;
  if(sunGone){
    sunLight.intensity = 0;
    sunMesh.visible = false;
    this.innerText = "☀ Sonne einschalten";
  } else {
    sunLight.intensity = 1.5;
    sunMesh.visible = true;
    this.innerText = "☀ Sonne ausschalten";
  }
};

document.getElementById("resetBtn").onclick = function(){
  sunGone = false;
  sunLight.intensity = 1.5;
  sunMesh.visible = true;
  document.getElementById("sunBtn").innerText = "☀ Sonne ausschalten";
};

// Animation
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.001;
  atmosphere.rotation.y += 0.001;

  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
