<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Erweiterte Klimasimulation ohne Sonne</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial;}
#panel{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.7);
    padding:15px;
    border-radius:10px;
}
button{
    padding:6px 12px;
    margin:3px;
    background:orange;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="panel">
<h3>🌍 Simulation ohne Sonne</h3>
<div id="status">Tag 0 | Globale Temp: 15°C</div>
<button onclick="startSim()">Start</button>
<button onclick="resetSim()">Reset</button>
</div>

<script>

// Szene
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new THREE.OrbitControls(camera, renderer.domElement);

// Erde
let geometry = new THREE.SphereGeometry(5,128,128);
let material = new THREE.MeshPhongMaterial({vertexColors:true});
let earth = new THREE.Mesh(geometry, material);
scene.add(earth);

let light = new THREE.PointLight(0xffffff,1.2);
light.position.set(10,10,10);
scene.add(light);

camera.position.z = 12;

// Simulation
let globalTemp;
let day;
let running=false;

function resetSim(){
    globalTemp = 15;
    day = 0;
    running = false;
    light.intensity = 1.2;
    updateSurface();
    document.getElementById("status").innerHTML =
        "Tag 0 | Globale Temp: 15°C";
}

function startSim(){
    running = true;
}

resetSim();

// Realistischere Strahlungsabkühlung (vereinfacht)
function coolPlanet(){
    const sigma = 5.67e-8;   // Stefan-Boltzmann
    const T = globalTemp + 273.15;
    const energyLoss = sigma * Math.pow(T,4);
    globalTemp -= energyLoss * 0.000000002; // skaliert für Simulation
}

function updateSurface(){

    let colors=[];
    let pos = geometry.attributes.position;

    for(let i=0;i<pos.count;i++){

        let y = pos.getY(i);
        let lat = Math.abs(y/5);  // 0 Äquator, 1 Pole

        // Polregionen kühlen schneller
        let localTemp = globalTemp - (lat*15);

        let color = new THREE.Color();

        // 🌿 Vegetationsabsterben langsam zwischen 5°C und -15°C
        if(localTemp > 5){
            color.setRGB(0.1,0.6,0.1); // gesund
        }
        else if(localTemp > -15){
            let factor = (localTemp+15)/20; 
            color.setRGB(0.4*(factor),0.3*(factor),0.1); // vertrocknet
        }

        // 💧 Kleine Gewässer frieren zuerst
        else if(localTemp > -30){
            color.setRGB(0.6,0.6,0.7); // gefrorene Seen
        }

        // 🌊 Große Ozeane gefrieren später
        else if(localTemp > -60){
            color.setRGB(0.8,0.8,0.9);
        }

        // ❄️ Komplett vereist
        else{
            color.setRGB(1,1,1);
        }

        colors.push(color.r,color.g,color.b);
    }

    geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
    geometry.attributes.color.needsUpdate = true;
}

function animate(){
    requestAnimationFrame(animate);

    earth.rotation.y += 0.0008; // langsamer
    controls.update();

    if(running){
        day += 0.2;  // Tage vergehen langsamer
        coolPlanet();
        updateSurface();

        light.intensity *= 0.999; // Sonne verschwindet langsam visuell

        document.getElementById("status").innerHTML =
            "Tag " + Math.floor(day) +
            " | Globale Temp: " + globalTemp.toFixed(1) + " °C";
    }

    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
