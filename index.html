<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonne verschwindet Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#globe{
position:absolute;
width:100%;
height:100%;
}

#chartBox{
position:absolute;
top:10px;
left:10px;
width:320px;
height:200px;
background:#000c;
padding:10px;
border-radius:10px;
}

#space{
position:absolute;
top:10px;
right:10px;
width:360px;
height:240px;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

button{
padding:12px 20px;
font-size:16px;
margin:5px;
border:none;
border-radius:8px;
background:#1e88e5;
color:white;
}

#tempBox{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#000a;
padding:10px;
border-radius:8px;
font-size:18px;
}

</style>
</head>

<body>

<div id="globe"></div>

<div id="chartBox">
<canvas id="chart"></canvas>
</div>

<canvas id="space"></canvas>

<div id="tempBox">Temperatur –</div>

<div id="controls">
<button onclick="startSimulation()">Simulation starten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<script>

/* -----------------------------
GLOBUS
----------------------------- */

let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
50,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 2;

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);

document.getElementById("globe").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x888888));

let light = new THREE.DirectionalLight(0xffffff,1.2);
light.position.set(5,3,5);
scene.add(light);

/* hochauflösende Erde */

let loader = new THREE.TextureLoader();

let earthTexture = loader.load(
"https://eoimages.gsfc.nasa.gov/images/imagerecords/74000/74192/world.topo.bathy.200401.3x5400x2700.jpg"
);

let earth = new THREE.Mesh(
new THREE.SphereGeometry(1,128,128),
new THREE.MeshPhongMaterial({map:earthTexture})
);

scene.add(earth);

/* Marker */

let marker = new THREE.Mesh(
new THREE.SphereGeometry(0.03,16,16),
new THREE.MeshBasicMaterial({color:0xff0000})
);

earth.add(marker);

/* Rotation */

let dragging=false;
let prevX,prevY;

renderer.domElement.addEventListener("pointerdown",e=>{
dragging=true;
prevX=e.clientX;
prevY=e.clientY;
});

renderer.domElement.addEventListener("pointermove",e=>{

if(!dragging)return;

earth.rotation.y+=(e.clientX-prevX)*0.005;
earth.rotation.x+=(e.clientY-prevY)*0.005;

prevX=e.clientX;
prevY=e.clientY;

});

renderer.domElement.addEventListener("pointerup",()=>dragging=false);

/* Klick auf Erde */

let selectedLat=0;
let temperature=15;
let simulation=false;

renderer.domElement.addEventListener("click",event=>{

let rect=renderer.domElement.getBoundingClientRect();

let mouse=new THREE.Vector2(
((event.clientX-rect.left)/rect.width)*2-1,
-((event.clientY-rect.top)/rect.height)*2+1
);

let ray=new THREE.Raycaster();
ray.setFromCamera(mouse,camera);

let hit=ray.intersectObject(earth);

if(hit.length){

let p=hit[0].point.clone().normalize();

marker.position.copy(p.multiplyScalar(1.02));

selectedLat=Math.asin(p.y)*180/Math.PI;

temperature=30-Math.abs(selectedLat)*0.6;

updateTemp();

}

});

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}

animate();

/* -----------------------------
TEMPERATUR
----------------------------- */

function updateTemp(){

document.getElementById("tempBox").innerHTML=
"Breitengrad "+selectedLat.toFixed(1)+"° | "+
temperature.toFixed(1)+" °C";

}

setInterval(()=>{

if(simulation){

temperature-=0.02;

updateTemp();

updateGraph();

}

},100);

/* -----------------------------
GRAPH
----------------------------- */

let chart=new Chart(
document.getElementById("chart"),
{
type:"line",
data:{
labels:[],
datasets:[{
label:"Temperatur",
data:[],
borderColor:"cyan"
}]
}
}
);

function updateGraph(){

chart.data.labels.push("");

chart.data.datasets[0].data.push(temperature);

chart.update();

}

/* -----------------------------
SONNENSYSTEM
----------------------------- */

let canvas=document.getElementById("space");
let ctx=canvas.getContext("2d");

canvas.width=360;
canvas.height=240;

let sunAlive=true;

let planets=[
{r:20,a:0,s:0.05,c:"#aaa"},
{r:35,a:0,s:0.04,c:"#ffcc66"},
{r:50,a:0,s:0.03,c:"#00aaff"},
{r:70,a:0,s:0.025,c:"#ff5533"},
{r:100,a:0,s:0.015,c:"#e2c290"},
{r:130,a:0,s:0.012,c:"#f0d28a"},
{r:160,a:0,s:0.01,c:"#7ec8e3"},
{r:190,a:0,s:0.009,c:"#4169e1"}
];

function drawSpace(){

ctx.fillStyle="black";
ctx.fillRect(0,0,360,240);

if(sunAlive){

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(180,120,14,0,Math.PI*2);
ctx.fill();

}

/* Umlaufbahnen */

ctx.strokeStyle="#333";

planets.forEach(p=>{
ctx.beginPath();
ctx.arc(180,120,p.r,0,Math.PI*2);
ctx.stroke();
});

/* Planeten */

planets.forEach(p=>{

if(sunAlive){

p.a+=p.s;

p.x=180+Math.cos(p.a)*p.r;
p.y=120+Math.sin(p.a)*p.r;

p.vx=Math.cos(p.a+Math.PI/2)*0.7;
p.vy=Math.sin(p.a+Math.PI/2)*0.7;

}else{

p.x+=p.vx;
p.y+=p.vy;

}

ctx.fillStyle=p.c;

ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(drawSpace);

}

drawSpace();

/* -----------------------------
SIMULATION
----------------------------- */

function startSimulation(){

simulation=true;

setTimeout(()=>{
sunAlive=false;
},3000);

}

function resetSimulation(){

location.reload();

}

</script>

</body>
</html>
