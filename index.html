<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sonnen Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial; }
#ui {
  position:absolute;
  bottom:10px;
  left:10px;
}
button {
  padding:6px 12px;
  margin:5px;
}
</style>
</head>
<body>

<div id="ui">
<button onclick="toggleSun()">☀ Sonne verschwinden lassen</button>
<button onclick="resetSim()">Reset</button>
</div>

<script>

// Szene
let scene = new THREE.Scene();

// Kamera
let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3;

// Renderer
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Steuerung
let controls = new THREE.OrbitControls(camera, renderer.domElement);

// 🌍 Erde mit echter Textur
let textureLoader = new THREE.TextureLoader();

let earthTexture = textureLoader.load(
  "https://threejs.org/examples/textures/earth_atmos_2048.jpg"
);

let geometry = new THREE.SphereGeometry(1, 64, 64);
let material = new THREE.MeshPhongMaterial({
  map: earthTexture
});
let earth = new THREE.Mesh(geometry, material);
scene.add(earth);

// ☀ Sonne (Lichtquelle)
let sunLight = new THREE.PointLight(0xffffff, 1.5, 100);
sunLight.position.set(5, 0, 5);
scene.add(sunLight);

// Sichtbare Sonne als Kugel
let sunGeometry = new THREE.SphereGeometry(0.4, 32, 32);
let sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
let sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
sunMesh.position.copy(sunLight.position);
scene.add(sunMesh);

// 🌌 Sterne Hintergrund
let starGeometry = new THREE.BufferGeometry();
let starVertices = [];
for(let i=0;i<1000;i++){
  starVertices.push(
    THREE.MathUtils.randFloatSpread(200),
    THREE.MathUtils.randFloatSpread(200),
    THREE.MathUtils.randFloatSpread(200)
  );
}
starGeometry.setAttribute(
  'position',
  new THREE.Float32BufferAttribute(starVertices,3)
);
let starMaterial = new THREE.PointsMaterial({color:0xffffff});
let stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Simulation
let sunGone = false;

function toggleSun(){
  sunGone = !sunGone;
  if(sunGone){
    sunLight.intensity = 0;
    sunMesh.visible = false;
  } else {
    sunLight.intensity = 1.5;
    sunMesh.visible = true;
  }
}

function resetSim(){
  sunGone = false;
  sunLight.intensity = 1.5;
  sunMesh.visible = true;
}

// Animation
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.002;

  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
