<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earth Climate Simulation</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

/* Temperatur */
#tempDisplay{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:22px;
z-index:10;
}

/* Graph */
#graph{
position:absolute;
top:20px;
left:20px;
width:300px;
height:150px;
background:rgba(0,0,0,0.6);
border:1px solid white;
z-index:10;
}

/* Protokoll */
#log{
position:absolute;
top:190px;
left:20px;
width:300px;
height:220px;
background:rgba(0,0,0,0.6);
border:1px solid white;
color:white;
font-size:14px;
overflow-y:auto;
padding:5px;
z-index:10;
}

/* Sonnensystem */
#solarSystem{
position:absolute;
top:20px;
right:20px;
width:320px;
height:320px;
border:1px solid white;
}

/* Buttons */
#controls{
position:absolute;
bottom:20px;
right:20px;
z-index:10;
}

button{
padding:10px;
margin:5px;
font-size:14px;
}

</style>
</head>

<body>

<canvas id="graph"></canvas>
<div id="log"></div>
<div id="solarSystem"></div>

<div id="controls">
<button onclick="turnOffSun()">Sonne ausschalten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<div id="tempDisplay">Temperatur: -- °C</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>

</body>
</html>
