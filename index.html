<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Realistische Klima-Simulation ohne Sonne</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
    text-align:center;
}
.container{
    padding:20px;
}
button{
    padding:10px 20px;
    font-size:16px;
    background:orange;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
canvas{
    max-width:900px;
    margin:20px auto;
}
.status{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">
<h1>🌍 Was passiert mit dem Klima ohne Sonne?</h1>
<p>Simulation basiert auf realistischen physikalischen Näherungen</p>
<button onclick="startSimulation()">Simulation starten</button>

<canvas id="chart"></canvas>

<div class="status" id="status">
Temperatur: 15°C (Startwert)
</div>
</div>

<script>

let chart;
let temperature = 15; // globale Durchschnittstemperatur °C
let time = 0; // Tage
let oceanFrozen = 0; // Eis-Schicht in Metern
let biosphereCollapse = false;

function startSimulation(){

    temperature = 15;
    time = 0;
    oceanFrozen = 0;
    biosphereCollapse = false;

    const ctx = document.getElementById('chart').getContext('2d');

    if(chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Globale Durchschnittstemperatur (°C)',
                data: [],
                borderColor: 'cyan',
                borderWidth: 2,
                tension: 0.2
            }]
        },
        options:{
            scales:{
                y:{
                    beginAtZero:false
                }
            }
        }
    });

    let interval = setInterval(()=>{

        time++;

        // Realistische exponentielle Abkühlung
        if(time <= 7){
            temperature -= 3;  // schneller Abfall erste Woche
        } else if(time <= 30){
            temperature -= 0.5;
        } else {
            temperature -= 0.02; // langsame weitere Abkühlung
        }

        // Ozean gefriert unter 0°C
        if(temperature < 0){
            oceanFrozen += 0.1; // 10 cm pro Tag
        }

        // Biosphäre bricht bei -20°C global zusammen
        if(temperature < -20 && !biosphereCollapse){
            biosphereCollapse = true;
        }

        chart.data.labels.push("Tag " + time);
        chart.data.datasets[0].data.push(temperature);
        chart.update();

        updateStatus();

        // Simulation nach 365 Tagen stoppen
        if(time >= 365){
            clearInterval(interval);
        }

    }, 200);
}

function updateStatus(){

    let statusText = `
    🌡 Temperatur: ${temperature.toFixed(2)} °C <br>
    🧊 Gefrorene Ozeanschicht: ${oceanFrozen.toFixed(1)} m <br>
    `;

    if(time === 1){
        statusText += "🌑 Die Erde wird nach 8 Minuten dunkel. Gravitation der Sonne verschwindet.";
    }

    if(biosphereCollapse){
        statusText += "<br>🌿 Die meisten Pflanzen und Tiere sind ausgestorben.";
    }

    if(temperature < -50){
        statusText += "<br>❄️ Atmosphäre beginnt zu kondensieren.";
    }

    if(temperature < -120){
        statusText += "<br>🌬 Stickstoff beginnt zu verflüssigen.";
    }

    document.getElementById("status").innerHTML = statusText;
}

</script>

</body>
</html>
