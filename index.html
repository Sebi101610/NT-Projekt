<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonne verschwindet Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#globe{
position:absolute;
width:100%;
height:100%;
}

#chartBox{
position:absolute;
top:10px;
left:10px;
width:320px;
height:200px;
background:#000c;
padding:10px;
border-radius:10px;
}

#space{
position:absolute;
top:10px;
right:10px;
width:320px;
height:220px;
}

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

button{
padding:12px 18px;
font-size:16px;
margin:5px;
border-radius:8px;
border:none;
background:#1e88e5;
color:white;
}

#tempBox{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
font-size:18px;
background:#000a;
padding:10px 15px;
border-radius:8px;
}

</style>
</head>

<body>

<div id="globe"></div>

<div id="chartBox">
<canvas id="chart"></canvas>
</div>

<canvas id="space"></canvas>

<div id="tempBox">
Ort: – | Temperatur: –
</div>

<div id="controls">
<button onclick="startSimulation()">Simulation starten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<script>

/* -----------------------------
GLOBUS
----------------------------- */

let scene,camera,renderer,earth,marker;
let selectedLat=0;
let temperature=15;
let simulation=false;

const container=document.getElementById("globe");

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=2.5;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x555555));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

const loader=new THREE.TextureLoader();

const earthTexture=loader.load(
"https://threejsfundamentals.org/threejs/resources/images/earth-day.jpg"
);

earth=new THREE.Mesh(
new THREE.SphereGeometry(1,128,128),
new THREE.MeshPhongMaterial({map:earthTexture})
);

scene.add(earth);

marker=new THREE.Mesh(
new THREE.SphereGeometry(0.03,16,16),
new THREE.MeshBasicMaterial({color:0xff0000})
);

scene.add(marker);

/* Drehung */

let isDragging=false;
let prevX,prevY;

renderer.domElement.addEventListener("pointerdown",e=>{
isDragging=true;
prevX=e.clientX;
prevY=e.clientY;
});

renderer.domElement.addEventListener("pointermove",e=>{

if(!isDragging)return;

let dx=e.clientX-prevX;
let dy=e.clientY-prevY;

earth.rotation.y+=dx*0.005;
earth.rotation.x+=dy*0.005;

prevX=e.clientX;
prevY=e.clientY;

});

renderer.domElement.addEventListener("pointerup",()=>isDragging=false);

/* Klick */

renderer.domElement.addEventListener("click",event=>{

const rect=renderer.domElement.getBoundingClientRect();

const mouse=new THREE.Vector2(
((event.clientX-rect.left)/rect.width)*2-1,
-((event.clientY-rect.top)/rect.height)*2+1
);

const raycaster=new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);

const hit=raycaster.intersectObject(earth);

if(hit.length){

const p=hit[0].point.clone().normalize();

marker.position.copy(p.multiplyScalar(1.02));

selectedLat=Math.asin(p.y)*180/Math.PI;

temperature=30-Math.abs(selectedLat)*0.6;

updateTemp();

}

});

function animate(){

requestAnimationFrame(animate);

renderer.render(scene,camera);

}

animate();

/* -----------------------------
TEMPERATUR
----------------------------- */

function updateTemp(){

document.getElementById("tempBox").innerHTML=
"Breitengrad: "+selectedLat.toFixed(1)+"° | Temperatur: "+
temperature.toFixed(1)+"°C";

}

setInterval(()=>{

if(simulation){

temperature-=0.02;

updateTemp();

updateGraph();

}

},100);

/* -----------------------------
GRAPH
----------------------------- */

let chart;

const ctx=document.getElementById("chart");

chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[{
label:"Temperatur",
data:[],
borderColor:"cyan"
}]
}
});

function updateGraph(){

chart.data.labels.push("");

chart.data.datasets[0].data.push(temperature);

chart.update();

}

/* -----------------------------
SONNENSYSTEM
----------------------------- */

const space=document.getElementById("space");
const ctx2=space.getContext("2d");

space.width=320;
space.height=220;

let angle=0;
let sunExists=true;

let planets=[
{r:20,s:0.04,c:"gray"},
{r:35,s:0.03,c:"orange"},
{r:50,s:0.02,c:"blue"},
{r:65,s:0.018,c:"red"},
{r:90,s:0.01,c:"#d2b48c"},
{r:120,s:0.008,c:"#f5deb3"},
{r:150,s:0.006,c:"#87cefa"},
{r:180,s:0.005,c:"#4169e1"}
];

function drawSpace(){

ctx2.fillStyle="black";
ctx2.fillRect(0,0,320,220);

if(sunExists){

ctx2.fillStyle="yellow";
ctx2.beginPath();
ctx2.arc(160,110,12,0,Math.PI*2);
ctx2.fill();

}

/* Orbits */

ctx2.strokeStyle="#333";

planets.forEach(p=>{
ctx2.beginPath();
ctx2.arc(160,110,p.r,0,Math.PI*2);
ctx2.stroke();
});

/* Planeten */

planets.forEach(p=>{

let x=160+Math.cos(angle*p.s)*p.r;
let y=110+Math.sin(angle*p.s)*p.r;

ctx2.fillStyle=p.c;
ctx2.beginPath();
ctx2.arc(x,y,4,0,Math.PI*2);
ctx2.fill();

});

angle+=1;

requestAnimationFrame(drawSpace);

}

drawSpace();

/* -----------------------------
SIMULATION
----------------------------- */

function startSimulation(){

simulation=true;

/* Sonne verschwindet */

setTimeout(()=>{
sunExists=false;
},3000);

}

function resetSimulation(){

location.reload();

}

</script>

</body>
</html>
