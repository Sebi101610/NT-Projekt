<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation: Was passiert ohne Sonne?</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #87CEEB, #1e3c72);
        color: white;
        text-align: center;
        margin: 0;
        padding: 0;
        transition: background 2s;
    }

    h1 {
        margin-top: 20px;
    }

    .container {
        margin-top: 40px;
    }

    select, button {
        padding: 10px;
        font-size: 16px;
        margin: 10px;
        border-radius: 5px;
        border: none;
    }

    button {
        cursor: pointer;
        background-color: orange;
        color: black;
        font-weight: bold;
    }

    .result {
        margin-top: 30px;
        font-size: 18px;
        width: 80%;
        margin-left: auto;
        margin-right: auto;
        padding: 20px;
        background-color: rgba(0,0,0,0.5);
        border-radius: 10px;
    }

    .dark {
        background: linear-gradient(to bottom, #000000, #050505);
    }
</style>
</head>

<body>

<h1>☀️ Was passiert, wenn die Sonne verschwindet?</h1>

<div class="container">
    <label for="zeit">Wähle eine Zeitperiode:</label><br>
    <select id="zeit">
        <option value="8min">8 Minuten</option>
        <option value="1tag">1 Tag</option>
        <option value="1woche">1 Woche</option>
        <option value="1jahr">1 Jahr</option>
        <option value="10jahre">10 Jahre</option>
    </select>
    <br>
    <button onclick="simulate()">Simulation starten</button>
</div>

<div class="result" id="output">
    Wähle eine Zeitperiode und starte die Simulation.
</div>

<script>
function simulate() {
    const selection = document.getElementById("zeit").value;
    const output = document.getElementById("output");
    const body = document.body;

    body.classList.add("dark");

    let text = "";

    if (selection === "8min") {
        text = "Nach 8 Minuten würde es auf der Erde plötzlich dunkel werden. Erst dann bemerken wir, dass die Sonne verschwunden ist. Gleichzeitig verschwindet auch ihre Gravitation – die Erde würde beginnen, sich geradeaus ins All zu bewegen.";
    }
    else if (selection === "1tag") {
        text = "Nach 1 Tag sinkt die Durchschnittstemperatur auf etwa 0°C. Pflanzen können keine Photosynthese mehr betreiben. Es wird weltweit eisig kalt.";
    }
    else if (selection === "1woche") {
        text = "Nach 1 Woche liegen die Temperaturen bei etwa -17°C. Viele Pflanzen sterben ab. Erste Teile der Nahrungskette brechen zusammen.";
    }
    else if (selection === "1jahr") {
        text = "Nach 1 Jahr liegt die Durchschnittstemperatur bei etwa -73°C. Die Ozeane sind an der Oberfläche gefroren. Nur wenige Lebensformen nahe hydrothermaler Quellen überleben.";
    }
    else if (selection === "10jahre") {
        text = "Nach 10 Jahren ist die Erde eine gefrorene, dunkle Welt mit Temperaturen um -200°C. Fast alles Leben auf der Oberfläche ist verschwunden.";
    }

    output.innerHTML = text;
}
</script>

</body>
</html>
