<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Realistische Sonnen-Verschwinden Simulation</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    transition: background 2s;
}

/* Steuerung */
#controls {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    z-index: 1000;
}

#scene {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* Himmel */
.sky {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(#6ec6ff, #4CAF50);
    transition: background 3s;
}

/* Sterne */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0;
    transition: opacity 3s;
}

/* Sonne */
#sun {
    position: absolute;
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, #fff176, #fbc02d);
    border-radius: 50%;
    top: 80px;
    right: 150px;
    box-shadow: 0 0 120px rgba(255, 223, 0, 0.9);
    transition: opacity 3s;
}

/* Boden */
.ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 35%;
    background: linear-gradient(#2e7d32, #1b5e20);
    transition: background 3s;
}

/* Baum */
.tree {
    position: absolute;
    bottom: 35%;
    left: 30%;
}

.trunk {
    width: 20px;
    height: 100px;
    background: #5d4037;
    margin-left: 30px;
}

.leaves {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #2e7d32, #1b5e20);
    border-radius: 50%;
    transition: background 2s;
}

/* See */
#lake {
    position: absolute;
    bottom: 20%;
    right: 20%;
    width: 250px;
    height: 100px;
    background: radial-gradient(circle, #42a5f5, #1565c0);
    border-radius: 50%;
    transition: background 3s;
}

/* Frost */
#frost {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(200, 230, 255, 0.2);
    backdrop-filter: blur(2px);
    opacity: 0;
    transition: opacity 3s;
}
</style>
</head>

<body>

<div id="controls">
    <h2>🌞 Was passiert ohne Sonne?</h2>
    <input type="range" min="0" max="365" value="0" id="slider">
    <p><strong>Tage ohne Sonne:</strong> <span id="days">0</span></p>
    <p><strong>Temperatur:</strong> <span id="temp">15</span> °C</p>
    <p id="status">Alles normal.</p>
</div>

<div id="scene">
    <div class="sky" id="sky"></div>
    <div class="stars" id="stars"></div>
    <div id="sun"></div>
    <div class="ground" id="ground"></div>

    <div class="tree">
        <div class="leaves" id="leaves"></div>
        <div class="trunk"></div>
    </div>

    <div id="lake"></div>
    <div id="frost"></div>
</div>

<script>
const slider = document.getElementById("slider");
const daysDisplay = document.getElementById("days");
const tempDisplay = document.getElementById("temp");
const status = document.getElementById("status");

const sky = document.getElementById("sky");
const stars = document.getElementById("stars");
const sun = document.getElementById("sun");
const leaves = document.getElementById("leaves");
const lake = document.getElementById("lake");
const frost = document.getElementById("frost");
const ground = document.getElementById("ground");

slider.addEventListener("input", function() {

    let days = parseInt(slider.value);
    daysDisplay.textContent = days;

    // Temperaturmodell (vereinfachtes realistisches Modell)
    let temperature = 15 - (days * 0.5);

    if(days > 7) temperature = 15 - (7 * 0.5) - ((days-7) * 1.5);
    if(days > 30) temperature = -40 - ((days-30) * 0.5);
    if(temperature < -150) temperature = -150;

    tempDisplay.textContent = temperature.toFixed(1);

    // Himmel & Sonne
    let darkness = Math.min(days / 5, 1);
    sky.style.background = `linear-gradient(rgb(${110-90*darkness},${198-150*darkness},255), rgb(${76-60*darkness},${175-140*darkness},80))`;
    stars.style.opacity = darkness;
    sun.style.opacity = 1 - darkness;

    // Baum stirbt
    if(temperature < 0) leaves.style.background = "brown";
    if(temperature < -20) leaves.style.background = "black";

    // See friert
    if(temperature < 0) lake.style.background = "radial-gradient(circle, #bbdefb, #90caf9)";
    if(temperature < -30) lake.style.background = "#e3f2fd";

    // Frost Overlay
    if(temperature < -10) frost.style.opacity = 0.4;
    else frost.style.opacity = 0;

    // Statusmeldungen
    if(days === 0) status.textContent = "Die Sonne scheint – stabiles Ökosystem.";
    else if(days < 3) status.textContent = "Dunkelheit beginnt. Temperaturen sinken.";
    else if(days < 7) status.textContent = "Photosynthese stoppt. Pflanzen geraten unter Stress.";
    else if(days < 30) status.textContent = "Massives Artensterben beginnt.";
    else if(days < 180) status.textContent = "Ozeane frieren oberflächlich zu.";
    else status.textContent = "Nahezu globale Vereisung. Nur wenige Lebensformen überleben.";
});
</script>

</body>
</html>
