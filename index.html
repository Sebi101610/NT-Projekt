<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonne verschwindet Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

/* Globus */

#globe{
position:absolute;
width:100%;
height:100%;
}

/* Graph */

#chartBox{
position:absolute;
top:10px;
left:10px;
width:300px;
height:200px;
background:#000c;
padding:10px;
border-radius:10px;
}

/* Sonnensystem */

#space{
position:absolute;
top:10px;
right:10px;
width:320px;
height:220px;
}

/* Buttons */

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

button{
padding:12px 20px;
font-size:16px;
margin:5px;
border:none;
border-radius:8px;
background:#1e88e5;
color:white;
}

/* Temperatur */

#tempBox{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#000a;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div id="globe"></div>

<div id="chartBox">
<canvas id="chart"></canvas>
</div>

<canvas id="space"></canvas>

<div id="tempBox">
Temperatur: –
</div>

<div id="controls">
<button onclick="startSimulation()">Simulation starten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<script>

/* -----------------------------
GLOBUS
----------------------------- */

let scene,camera,renderer,earth,marker;
let temperature=15;
let simulation=false;
let selectedLat=0;

const container=document.getElementById("globe");

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,0,3);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

container.appendChild(renderer.domElement);

/* Licht */

scene.add(new THREE.AmbientLight(0x666666));

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

/* Erde */

const loader=new THREE.TextureLoader();

const texture=loader.load(
"https://upload.wikimedia.org/wikipedia/commons/2/2c/Blue_Marble_2002.png"
);

earth=new THREE.Mesh(
new THREE.SphereGeometry(1,128,128),
new THREE.MeshPhongMaterial({map:texture})
);

scene.add(earth);

/* Marker */

marker=new THREE.Mesh(
new THREE.SphereGeometry(0.03,16,16),
new THREE.MeshBasicMaterial({color:0xff0000})
);

scene.add(marker);

/* Rotation */

let dragging=false;
let prevX,prevY;

renderer.domElement.addEventListener("pointerdown",e=>{
dragging=true;
prevX=e.clientX;
prevY=e.clientY;
});

renderer.domElement.addEventListener("pointermove",e=>{

if(!dragging)return;

earth.rotation.y+=(e.clientX-prevX)*0.005;
earth.rotation.x+=(e.clientY-prevY)*0.005;

prevX=e.clientX;
prevY=e.clientY;

});

renderer.domElement.addEventListener("pointerup",()=>dragging=false);

/* Klick */

renderer.domElement.addEventListener("click",event=>{

const rect=renderer.domElement.getBoundingClientRect();

const mouse=new THREE.Vector2(
((event.clientX-rect.left)/rect.width)*2-1,
-((event.clientY-rect.top)/rect.height)*2+1
);

const raycaster=new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);

const hit=raycaster.intersectObject(earth);

if(hit.length){

let p=hit[0].point.clone().normalize();

marker.position.copy(p.multiplyScalar(1.02));

selectedLat=Math.asin(p.y)*180/Math.PI;

temperature=30-Math.abs(selectedLat)*0.6;

updateTemp();

}

});

function animate(){

requestAnimationFrame(animate);

renderer.render(scene,camera);

}

animate();

/* -----------------------------
TEMPERATUR
----------------------------- */

function updateTemp(){

document.getElementById("tempBox").innerHTML=
"Breitengrad "+selectedLat.toFixed(1)+"° | "+
temperature.toFixed(1)+" °C";

}

setInterval(()=>{

if(simulation){

temperature-=0.02;

updateTemp();

updateGraph();

}

},100);

/* -----------------------------
GRAPH
----------------------------- */

let chart;

chart=new Chart(
document.getElementById("chart"),
{
type:"line",
data:{
labels:[],
datasets:[{
label:"Temperatur",
data:[],
borderColor:"cyan"
}]
}
}
);

function updateGraph(){

chart.data.labels.push("");

chart.data.datasets[0].data.push(temperature);

chart.update();

}

/* -----------------------------
SONNENSYSTEM
----------------------------- */

const space=document.getElementById("space");
const ctx=space.getContext("2d");

space.width=320;
space.height=220;

let sunAlive=true;

let planets=[
{r:20,a:0,vx:0,vy:0,color:"gray"},
{r:35,a:0,vx:0,vy:0,color:"orange"},
{r:50,a:0,vx:0,vy:0,color:"blue"},
{r:70,a:0,vx:0,vy:0,color:"red"}
];

function drawSpace(){

ctx.fillStyle="black";
ctx.fillRect(0,0,320,220);

/* Sonne */

if(sunAlive){

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(160,110,12,0,Math.PI*2);
ctx.fill();

}

/* Planeten */

planets.forEach(p=>{

if(sunAlive){

p.a+=0.01;

p.x=160+Math.cos(p.a)*p.r;
p.y=110+Math.sin(p.a)*p.r;

p.vx=Math.cos(p.a+Math.PI/2)*0.6;
p.vy=Math.sin(p.a+Math.PI/2)*0.6;

}else{

p.x+=p.vx;
p.y+=p.vy;

}

ctx.fillStyle=p.color;

ctx.beginPath();
ctx.arc(p.x,p.y,4,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(drawSpace);

}

drawSpace();

/* -----------------------------
SIMULATION
----------------------------- */

function startSimulation(){

simulation=true;

setTimeout(()=>{
sunAlive=false;
},3000);

}

function resetSimulation(){

location.reload();

}

</script>

</body>
</html>
