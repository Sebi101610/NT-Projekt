<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>3D Klima Simulation ohne Sonne</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}
#info {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 8px;
}
button {
    padding: 8px 15px;
    margin-top: 10px;
    cursor: pointer;
    background: orange;
    border: none;
    border-radius: 5px;
}
</style>
</head>
<body>

<div id="info">
<h2>🌍 Simulation ohne Sonne</h2>
<div id="status">Temperatur: 15°C</div>
<button onclick="startSimulation()">Simulation starten</button>
</div>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new THREE.OrbitControls(camera, renderer.domElement);

let geometry = new THREE.SphereGeometry(5, 64, 64);
let material = new THREE.MeshStandardMaterial({
    color: 0x2e8b57,
    roughness: 1
});

let earth = new THREE.Mesh(geometry, material);
scene.add(earth);

let light = new THREE.PointLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

camera.position.z = 12;

let temperature = 15;
let time = 0;

function startSimulation(){

    let interval = setInterval(()=>{

        time++;

        // Realistischere Abkühlung
        if(time <= 7){
            temperature -= 3;
        } else if(time <= 30){
            temperature -= 0.5;
        } else {
            temperature -= 0.02;
        }

        updateEarthColor();
        document.getElementById("status").innerHTML =
            "🌡 Globale Temperatur: " + temperature.toFixed(1) + " °C";

        if(time > 365){
            clearInterval(interval);
        }

    }, 200);
}

function updateEarthColor(){

    // Vegetation stirbt unter 0°C langsam ab
    if(temperature > 0){
        earth.material.color.set(0x2e8b57); // grün
    }
    else if(temperature > -20){
        earth.material.color.set(0x8b4513); // braun
    }
    else if(temperature > -50){
        earth.material.color.set(0xaaaaaa); // grau
    }
    else{
        earth.material.color.set(0xffffff); // komplett vereist
    }

}

function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y += 0.002;
    controls.update();
    renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
