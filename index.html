<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>3D Globus – Was passiert ohne Sonne?</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui {
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:20px;
    border-radius:12px;
    width:300px;
    z-index:10;
}
input { width:100%; }
</style>
</head>
<body>

<div id="ui">
<h2>🌞 Sonne verschwindet</h2>
<input type="range" min="0" max="365" value="0" id="slider">
<p>Tage ohne Sonne: <span id="days">0</span></p>
<p>Ø Temperatur: <span id="temp">15</span> °C</p>
<p id="status">Normale Bedingungen</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152/examples/js/controls/OrbitControls.js"></script>

<script>

// Szene
const scene = new THREE.Scene();

// Kamera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Steuerung wie Google Earth
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Licht (Sonne)
const sunLight = new THREE.PointLight(0xffffff, 1.5);
sunLight.position.set(5,3,5);
scene.add(sunLight);

// Erd-Textur
const textureLoader = new THREE.TextureLoader();

const earthTexture = textureLoader.load(
'https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg'
);

const earthMaterial = new THREE.MeshStandardMaterial({
    map: earthTexture
});

const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

// Sterne Hintergrund
const starGeometry = new THREE.SphereGeometry(90, 64, 64);
const starMaterial = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    side: THREE.BackSide
});
const stars = new THREE.Mesh(starGeometry, starMaterial);
scene.add(stars);

// Temperaturmodell
function calculateTemp(days){
    if(days===0) return 15;
    if(days<=7) return 15 - (days*4.5);
    if(days<=30) return -17 - ((days-7)*1);
    return -40 - ((days-30)*0.1);
}

// UI Steuerung
const slider = document.getElementById("slider");
const daysEl = document.getElementById("days");
const tempEl = document.getElementById("temp");
const status = document.getElementById("status");

slider.addEventListener("input", function(){

    let days = parseInt(slider.value);
    daysEl.textContent = days;

    let temp = calculateTemp(days);
    tempEl.textContent = temp.toFixed(1);

    // Lichtverlust
    let lightIntensity = Math.max(1.5 - days*0.2, 0);
    sunLight.intensity = lightIntensity;

    // Globale Verdunkelung
    earth.material.color.setRGB(
        1 - days/200,
        1 - days/200,
        1 - days/200
    );

    // Eis-Ausbreitung simulieren
    if(temp < -10){
        earth.material.color.setRGB(0.8,0.9,1);
    }
    if(temp < -40){
        earth.material.color.setRGB(0.9,0.95,1);
    }

    // Status
    if(days===0) status.textContent="Normale Ökosysteme.";
    else if(days<7) status.textContent="Photosynthese stoppt.";
    else if(days<30) status.textContent="Massives Artensterben.";
    else if(days<180) status.textContent="Ozeane frieren oberflächlich.";
    else status.textContent="Nahe globale Vereisung.";

});

// Animation
function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y += 0.001;
    controls.update();
    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
