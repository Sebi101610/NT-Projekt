<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonne verschwindet Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

#globeContainer{
width:100%;
height:60vh;
display:block;
}

#charts{
height:30vh;
display:flex;
}

canvas{
flex:1;
background:#111;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
}

button{
padding:10px;
margin-right:5px;
}

#space{
position:absolute;
top:0;
right:0;
width:200px;
height:120px;
border-left:2px solid #333;
border-bottom:2px solid #333;
}

#info{
position:absolute;
bottom:10px;
left:10px;
background:#000a;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="ui">
<button onclick="startSimulation()">Simulation starten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<canvas id="space"></canvas>

<div id="globeContainer"></div>

<div id="charts">
<canvas id="tempChart"></canvas>
</div>

<div id="info">Klicke auf einen Ort auf der Erde</div>

<script>

let scene,camera,renderer,earth,marker;
let selectedPoint=null;

init();
animate();

function init(){

const container=document.getElementById("globeContainer");

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
container.clientWidth/container.clientHeight,
0.1,
1000
);

camera.position.z=2.5;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth,container.clientHeight);

container.appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x555555));

let loader=new THREE.TextureLoader();

let texture=loader.load(
"https://threejsfundamentals.org/threejs/resources/images/earth-day.jpg"
);

let geometry=new THREE.SphereGeometry(1,64,64);

let material=new THREE.MeshPhongMaterial({
map:texture
});

earth=new THREE.Mesh(geometry,material);

scene.add(earth);

marker=new THREE.Mesh(
new THREE.SphereGeometry(0.03,16,16),
new THREE.MeshBasicMaterial({color:0xff0000})
);

scene.add(marker);

renderer.domElement.addEventListener("click",onClick);

}

function animate(){

requestAnimationFrame(animate);

earth.rotation.y+=0.001;

renderer.render(scene,camera);

}

function onClick(event){

const rect=renderer.domElement.getBoundingClientRect();

const mouse=new THREE.Vector2(
((event.clientX-rect.left)/rect.width)*2-1,
-((event.clientY-rect.top)/rect.height)*2+1
);

const raycaster=new THREE.Raycaster();

raycaster.setFromCamera(mouse,camera);

const intersects=raycaster.intersectObject(earth);

if(intersects.length>0){

selectedPoint=intersects[0].point;

marker.position.copy(
selectedPoint.clone().normalize().multiplyScalar(1.02)
);

document.getElementById("info").innerHTML=
"Ort gewählt – Simulation starten";

}

}

let chart;

function startSimulation(){

if(!selectedPoint)return;

let labels=[];
let temps=[];

let temp=15;

for(let day=0;day<50;day++){

temp-=1.3;

labels.push("Tag "+day);

temps.push(temp);

}

const ctx=document.getElementById("tempChart").getContext("2d");

if(chart)chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Temperatur °C",
data:temps,
borderColor:"cyan"
}]
}
});

spaceAnimation();

}

function resetSimulation(){

location.reload();

}

function spaceAnimation(){

let canvas=document.getElementById("space");

let ctx=canvas.getContext("2d");

canvas.width=200;
canvas.height=120;

let sunX=70;

setInterval(()=>{

ctx.fillStyle="black";
ctx.fillRect(0,0,200,120);

ctx.fillStyle="yellow";

ctx.beginPath();
ctx.arc(sunX,60,18,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="blue";

ctx.beginPath();
ctx.arc(150,60,6,0,Math.PI*2);
ctx.fill();

sunX-=1;

},40);

}

</script>

</body>
</html>
