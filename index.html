<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earth Climate Simulation</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;}
#tempDisplay{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:white;font-size:22px;z-index:10;}
#graph{position:absolute;top:20px;left:20px;width:300px;height:150px;background:rgba(0,0,0,0.6);border:1px solid white;z-index:10;}
#log{position:absolute;top:190px;left:20px;width:300px;height:220px;background:rgba(0,0,0,0.6);border:1px solid white;color:white;font-size:14px;overflow-y:auto;padding:5px;z-index:10;}
#solarSystem{position:absolute;top:20px;right:20px;width:320px;height:320px;border:1px solid white;}
#controls{position:absolute;bottom:20px;right:20px;z-index:10;}
button{padding:10px;margin:5px;font-size:14px;}
</style>
</head>
<body>

<canvas id="graph"></canvas>
<div id="log"></div>
<div id="solarSystem"></div>

<div id="controls">
<button onclick="turnOffSun()">Sonne ausschalten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<div id="tempDisplay">Temperatur: -- °C</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== GLOBUS =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

// Erde
const earthTexture = new THREE.TextureLoader().load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");
const earth = new THREE.Mesh(new THREE.SphereGeometry(1,64,64), new THREE.MeshPhongMaterial({map:earthTexture}));
scene.add(earth);

// Marker
const marker = new THREE.Mesh(new THREE.SphereGeometry(0.03,16,16), new THREE.MeshBasicMaterial({color:0xff0000}));
earth.add(marker);
marker.visible=false;

// ===== GRAPH =====
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");
canvas.width=300; canvas.height=150;
let temps=[];
function drawGraph(){

  ctx.clearRect(0,0,300,150)

  ctx.strokeStyle="white"
  ctx.fillStyle="white"
  ctx.font="10px Arial"

  // X Achse
  ctx.beginPath()
  ctx.moveTo(30,130)
  ctx.lineTo(290,130)
  ctx.stroke()

  // Y Achse
  ctx.beginPath()
  ctx.moveTo(30,10)
  ctx.lineTo(30,130)
  ctx.stroke()

  // Y Skala (Temperatur)
  for(let i=0;i<=5;i++){

    let temp = 30 - i*10
    let y = 20 + i*20

    ctx.fillText(temp+"°C",2,y+3)

    ctx.beginPath()
    ctx.moveTo(25,y)
    ctx.lineTo(30,y)
    ctx.stroke()
  }

  // X Skala (Tage)
  for(let i=0;i<temps.length;i++){

    let x = 30 + i*8

    if(i % 5 === 0){
      ctx.fillText(i,x-3,145)
    }
  }

  // Achsentitel
  ctx.fillText("Temperatur",5,10)
  ctx.fillText("Tage",250,145)

  // Linie zeichnen
  ctx.beginPath()

  for(let i=0;i<temps.length;i++){

    let x = 30 + i*8
    let y = 130 - (temps[i]+50)*1.2

    if(i===0) ctx.moveTo(x,y)
    else ctx.lineTo(x,y)

  }

  ctx.strokeStyle="red"
  ctx.stroke()

}
// ===== PROTOKOLL =====
function logEvent(text){const log=document.getElementById("log"); const time=new Date().toLocaleTimeString(); log.innerHTML += "["+time+"] "+text+"<br>"; log.scrollTop = log.scrollHeight;}

// ===== WETTER =====
let selectedLat=0, selectedLon=0;
  async function loadWeather(lat,lon){

  selectedLat = lat;
  selectedLon = lon;

  // Wenn Simulation schon läuft -> KEINE neue Temperatur laden
  if(!sunOn){
    return;
  }

  try{

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`;

    const res = await fetch(url);
    const data = await res.json();

    const temp = data.current.temperature_2m;

    document.getElementById("tempDisplay").innerText =
      "Temperatur: " + temp + " °C";

    temps = [temp];   // Startwert für Graph
    drawGraph();

  }catch(e){

    document.getElementById("tempDisplay").innerText =
      "Temperatur konnte nicht geladen werden";

  }
}

// ===== MARKER KLICK =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
window.addEventListener("click",(event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  let hit = raycaster.intersectObject(earth);
  if(hit.length>0){
    const p = earth.worldToLocal(hit[0].point.clone());
    marker.position.copy(p.normalize().multiplyScalar(1.02));
    marker.visible=true;
    const lat = Math.asin(p.y)*(180/Math.PI);
    const lon = Math.atan2(p.z,p.x)*(180/Math.PI);
    loadWeather(lat,lon);
  }
});

// ===== GLOBUS DREHEN =====
// ===== TOUCH + MAUS STEUERUNG =====

let dragging=false
let px=0
let py=0
let pinchStartDistance=null

function getTouchDistance(touches){
  const dx = touches[0].clientX - touches[1].clientX
  const dy = touches[0].clientY - touches[1].clientY
  return Math.sqrt(dx*dx + dy*dy)
}

// Maus drehen
window.addEventListener("mousedown",(e)=>{
  dragging=true
  px=e.clientX
  py=e.clientY
})

window.addEventListener("mouseup",()=>dragging=false)

window.addEventListener("mousemove",(e)=>{

  if(!dragging) return

  earth.rotation.y += (e.clientX-px)*0.005
  earth.rotation.x += (e.clientY-py)*0.005

  px=e.clientX
  py=e.clientY

})

// Touch drehen
window.addEventListener("touchstart",(e)=>{

  if(e.touches.length==1){

    dragging=true
    px=e.touches[0].clientX
    py=e.touches[0].clientY

  }

  if(e.touches.length==2){

    pinchStartDistance = getTouchDistance(e.touches)

  }

})

// Touch bewegen
window.addEventListener("touchmove",(e)=>{

  // Globus drehen
  if(e.touches.length==1 && dragging){

    let cx = e.touches[0].clientX
    let cy = e.touches[0].clientY

    earth.rotation.y += (cx-px)*0.005
    earth.rotation.x += (cy-py)*0.005

    px=cx
    py=cy

  }

  // Zoom mit zwei Fingern
  if(e.touches.length==2){

    let dist = getTouchDistance(e.touches)

    if(pinchStartDistance){

      let zoom = dist - pinchStartDistance

      camera.position.z -= zoom*0.01

      camera.position.z = Math.max(1.5,Math.min(10,camera.position.z))

    }

    pinchStartDistance = dist

  }

})

window.addEventListener("touchend",()=>{

  dragging=false
  pinchStartDistance=null

})
// ===== SONNENSYSTEM =====
const solarScene = new THREE.Scene();
const solarCamera = new THREE.PerspectiveCamera(60,1,0.1,1000);
solarCamera.position.z=15;
const solarRenderer = new THREE.WebGLRenderer();
solarRenderer.setSize(320,320);
document.getElementById("solarSystem").appendChild(solarRenderer.domElement);

const sun = new THREE.Mesh(new THREE.SphereGeometry(1,32,32), new THREE.MeshBasicMaterial({color:0xffff00}));
solarScene.add(sun);

const planetsData = [
  {name:"Merkur", color:0xaaaaaa, radius:3, speed:0.04},
  {name:"Venus", color:0xffcc88, radius:4, speed:0.03},
  {name:"Erde", color:0x00aaff, radius:5, speed:0.02},
  {name:"Mars", color:0xff0000, radius:6, speed:0.018},
  {name:"Jupiter", color:0xffaa00, radius:7.5, speed:0.01},
  {name:"Saturn", color:0xffddaa, radius:9, speed:0.008},
  {name:"Uranus", color:0x00ffff, radius:10.5, speed:0.006},
  {name:"Neptun", color:0x0000ff, radius:12, speed:0.005}
];

const planets = planetsData.map(p=>{
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16), new THREE.MeshBasicMaterial({color:p.color}));
  mesh.userData = {radius:p.radius, speed:p.speed, angle: Math.random()*Math.PI*2};
  solarScene.add(mesh);
  return mesh;
});

let sunOn=true;
let day=0;
let lastDayCommented=0;

// ===== SONNE AUSSCHALTEN =====
function turnOffSun(){
  if(!sunOn) return;
  sunOn=false;
  solarScene.remove(sun);
  logEvent("Sonne ausgeschaltet");
  lastDayCommented = 0;
}

// ===== RESET =====
function resetSimulation(){location.reload();}

// ===== ANIMATION =====
function animate(){
  requestAnimationFrame(animate);

  // Globus
  earth.rotation.y += 0.0005;

  // Sonnensystem
  day += 0.01; 

  planets.forEach(p=>{
    p.userData.angle += p.userData.speed;
    if(!sunOn) p.userData.radius += 0.01; 
    p.position.x = Math.cos(p.userData.angle)*p.userData.radius;
    p.position.z = Math.sin(p.userData.angle)*p.userData.radius;
  });

  // Tagesbasierte Kommentare wenn Sonne aus
  if(!sunOn){
    const currentDay = Math.floor(day);
    if(currentDay>lastDayCommented){
      switch(currentDay){
        case 1: logEvent("Tag 1: Temperaturen beginnen zu sinken. Gravitation leicht schwächer, minimaler Einfluss auf Menschheit."); break;
        case 3: logEvent("Tag 3: Erste Pflanzen sterben. Gravitation reduziert sich spürbar, leichte Probleme für Infrastruktur."); break;
        case 5: logEvent("Tag 5: Kleine Gewässer beginnen zu gefrieren. Menschliche Aktivitäten stark eingeschränkt."); break;
        case 10: logEvent("Tag 10: Ozeane gefrieren teilweise. Gravitation ungleichmäßig, Auswirkungen auf Gezeiten und Flugverkehr."); break;
        case 15: logEvent("Tag 15: Viele Pflanzen sterben, Nahrungsknappheit beginnt. Menschen müssen sich stark anpassen."); break;
        case 20: logEvent("Tag 20: Globale Temperaturen fallen drastisch. Gravitation beeinträchtigt Satellitenbahnen, menschliche Versorgungsketten stark gestört."); break;
        case 30: logEvent("Tag 30: Erde fast komplett gefroren. Gravitation kritisch verändert, menschliches Leben extrem eingeschränkt."); break;
      }
      lastDayCommented = currentDay;
      // Temperatur lokal nach Marker-Lat simulieren
      let baseTemp = 25 - currentDay*0.7;
      let latFactor = 1 - Math.abs(selectedLat)/90; // Pol-Äquator Unterschied
      temps.push(Math.max(0,baseTemp*latFactor));
      if(temps.length>30) temps.shift();
      drawGraph();
    }
  }

  solarRenderer.render(solarScene, solarCamera);
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
