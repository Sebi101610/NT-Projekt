<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sonnen-Ausfall Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; color:white; }

#chartBox{
 position:absolute;
 top:10px;
 left:10px;
 width:300px;
 background:rgba(0,0,0,0.7);
 padding:10px;
 border-radius:10px;
}

#ui{
 position:absolute;
 bottom:10px;
 width:100%;
 text-align:center;
}

button{
 padding:12px 20px;
 font-size:16px;
 margin:8px;
 border:none;
 border-radius:8px;
}

#info{
 margin-top:10px;
 font-size:16px;
}
</style>
</head>
<body>

<div id="chartBox">
<canvas id="tempChart"></canvas>
</div>

<div id="ui">
<button id="sunBtn">☀ Sonne ausschalten</button>
<button onclick="resetSim()">Reset</button>
<div id="info">Tippe auf einen Ort auf dem Globus.</div>
</div>

<script>

// Szene
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 3;

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

let controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableZoom=false;
controls.enableDamping=true;

// Erde
let loader = new THREE.TextureLoader();
let earthTexture = loader.load("https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/earthmap1k.jpg");

let earth = new THREE.Mesh(
 new THREE.SphereGeometry(1,64,64),
 new THREE.MeshPhongMaterial({map:earthTexture})
);
scene.add(earth);

// Atmosphäre
let atmosphere = new THREE.Mesh(
 new THREE.SphereGeometry(1.05,64,64),
 new THREE.MeshBasicMaterial({color:0x3399ff,transparent:true,opacity:0.2})
);
scene.add(atmosphere);

// Licht
let ambient = new THREE.AmbientLight(0xffffff,0.3);
scene.add(ambient);

let sunLight = new THREE.DirectionalLight(0xffffff,1.5);
sunLight.position.set(5,0,5);
scene.add(sunLight);

// Simulation
let sunGone=false;
let day=0;
let selectedLat=null;
let temperature=null;

// Chart
let ctx=document.getElementById("tempChart").getContext("2d");
let chart=new Chart(ctx,{
 type:'line',
 data:{labels:[],datasets:[{label:"Temperatur °C",data:[],borderColor:"red",fill:false}]},
 options:{animation:false,scales:{y:{min:-200,max:40}}}
});

// Sonne Button
document.getElementById("sunBtn").onclick=function(){
 sunGone=!sunGone;
 if(sunGone){
   sunLight.intensity=0;
   this.innerText="☀ Sonne einschalten";
 }else{
   sunLight.intensity=1.5;
   this.innerText="☀ Sonne ausschalten";
 }
};

// Reset
function resetSim(){
 sunGone=false;
 sunLight.intensity=1.5;
 day=0;
 temperature=null;
 selectedLat=null;
 chart.data.labels=[];
 chart.data.datasets[0].data=[];
 chart.update();
 document.getElementById("info").innerText="Tippe auf einen Ort auf dem Globus.";
 document.getElementById("sunBtn").innerText="☀ Sonne ausschalten";
}

// Klick auf Globus
let raycaster=new THREE.Raycaster();
let mouse=new THREE.Vector2();

renderer.domElement.addEventListener("click",function(event){
 let rect=renderer.domElement.getBoundingClientRect();
 mouse.x=((event.clientX-rect.left)/rect.width)*2-1;
 mouse.y=-((event.clientY-rect.top)/rect.height)*2+1;
 raycaster.setFromCamera(mouse,camera);
 let intersects=raycaster.intersectObject(earth);
 if(intersects.length>0){
   let point=intersects[0].point;
   selectedLat=point.y; // Breitengrad simulieren
   temperature=30 - Math.abs(selectedLat*40); // Tropen wärmer, Pole kälter
   day=0;
   chart.data.labels=[];
   chart.data.datasets[0].data=[];
   chart.update();
   document.getElementById("info").innerText="Ort gewählt. Starttemperatur: "+temperature.toFixed(1)+" °C";
 }
});

// Animation
function animate(){
 requestAnimationFrame(animate);

 earth.rotation.y+=0.001;
 atmosphere.rotation.y+=0.001;

 if(sunGone && selectedLat!==null){
   day+=0.1;

   // Realistischere Abkühlung
   if(day<7) temperature-=0.5;
   else if(day<30) temperature-=0.2;
   else temperature-=0.05;

   chart.data.labels.push(day.toFixed(1));
   chart.data.datasets[0].data.push(temperature);
   chart.update();

   let state="";
   if(day<7) state="Pflanzen sterben langsam.";
   else if(day<30) state="Gewässer beginnen zu frieren.";
   else if(day<180) state="Großteil des Lebens verschwunden.";
   else state="Ozeane gefroren, extreme Kälte.";

   document.getElementById("info").innerText=
   "Tag "+day.toFixed(1)+" | "+temperature.toFixed(1)+" °C | "+state;
 }

 controls.update();
 renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",function(){
 camera.aspect=window.innerWidth/window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
