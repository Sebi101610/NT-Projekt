<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>3D Globus Simulation</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui {
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.8);
    color:white;
    padding:20px;
    border-radius:12px;
    width:280px;
    z-index:10;
}
input { width:100%; }
</style>
</head>
<body>

<div id="ui">
<h2>🌞 Sonne verschwindet</h2>
<input type="range" min="0" max="365" value="0" id="slider">
<p>Tage: <span id="days">0</span></p>
<p>Ø Temperatur: <span id="temp">15</span> °C</p>
<p id="status">Normale Bedingungen</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>

// Szene
const scene = new THREE.Scene();

// Kamera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(5,3,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// Erde (ohne externe Textur)
const geometry = new THREE.SphereGeometry(1, 64, 64);
const material = new THREE.MeshStandardMaterial({
    color: 0x2e8b57,
    roughness: 1,
    metalness: 0
});
const earth = new THREE.Mesh(geometry, material);
scene.add(earth);

// Temperaturmodell
function calculateTemp(days){
    if(days===0) return 15;
    if(days<=7) return 15 - (days*4.5);
    if(days<=30) return -17 - ((days-7)*1);
    return -40 - ((days-30)*0.1);
}

// UI
const slider = document.getElementById("slider");
const daysEl = document.getElementById("days");
const tempEl = document.getElementById("temp");
const status = document.getElementById("status");

slider.addEventListener("input", function(){

    let days = parseInt(slider.value);
    daysEl.textContent = days;

    let temp = calculateTemp(days);
    tempEl.textContent = temp.toFixed(1);

    // Licht wird schwächer
    light.intensity = Math.max(2 - days*0.02, 0);

    // Farbveränderung der Erde
    if(temp > 0) earth.material.color.set(0x2e8b57);       // grün
    if(temp < 0) earth.material.color.set(0x8b4513);       // braun
    if(temp < -20) earth.material.color.set(0xcccccc);     // eisig
    if(temp < -50) earth.material.color.set(0xffffff);     // fast komplett Eis

    // Status
    if(days===0) status.textContent="Normale Ökosysteme.";
    else if(days<7) status.textContent="Photosynthese stoppt.";
    else if(days<30) status.textContent="Massives Artensterben.";
    else if(days<180) status.textContent="Ozeane frieren.";
    else status.textContent="Nahe globale Vereisung.";

});

// Maus-Rotation (einfach & stabil)
let isDragging=false;
let previousMousePosition={x:0,y:0};

renderer.domElement.addEventListener('mousedown', e=>{
    isDragging=true;
});
renderer.domElement.addEventListener('mouseup', e=>{
    isDragging=false;
});
renderer.domElement.addEventListener('mousemove', e=>{
    if(isDragging){
        let deltaMove = {
            x: e.offsetX-previousMousePosition.x,
            y: e.offsetY-previousMousePosition.y
        };
        earth.rotation.y += deltaMove.x * 0.005;
        earth.rotation.x += deltaMove.y * 0.005;
    }
    previousMousePosition = {
        x: e.offsetX,
        y: e.offsetY
    };
});

// Animation
function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y += 0.001;
    renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
