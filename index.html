<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Live Erd-Simulation</title>
<style>
body{margin:0;overflow:hidden;background:black;font-family:Arial;color:white;}
#ui{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
button{padding:10px 20px;font-size:16px;}
#graph{position:absolute;top:10px;left:10px;width:300px;height:150px;background:#000a;border-radius:8px;}
#space{position:absolute;top:10px;right:10px;width:320px;height:220px;background:black;border:1px solid white;}
#info{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);padding:10px 20px;border-radius:10px;}
</style>
</head>
<body>
<canvas id="graph" width="300" height="150"></canvas>
<canvas id="space" width="320" height="220"></canvas>
<div id="info">Ort: <span id="lat">–</span>°, Temperatur: <span id="temp">15</span>°C</div>
<div id="ui">
<button onclick="startSimulation()">Start</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene=new THREE.Scene();
let camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z=3;

let renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x888888));
let light=new THREE.PointLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

/* Verwendung einer funktionierenden, CORS-freien Erdtextur */
let loader=new THREE.TextureLoader();
let earthTexture=loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");
let earth=new THREE.Mesh(new THREE.SphereGeometry(1,64,64),new THREE.MeshPhongMaterial({map:earthTexture}));
scene.add(earth);

/* Marker */
let marker=new THREE.Mesh(new THREE.SphereGeometry(0.02,16,16),new THREE.MeshBasicMaterial({color:"red"}));
earth.add(marker);

let dragging=false,prevX,prevY;
renderer.domElement.addEventListener("pointerdown",e=>{dragging=true;prevX=e.clientX;prevY=e.clientY;});
renderer.domElement.addEventListener("pointermove",e=>{
if(!dragging) return;
earth.rotation.y+=(e.clientX-prevX)*0.005;
earth.rotation.x+=(e.clientY-prevY)*0.005;
prevX=e.clientX; prevY=e.clientY;
});
renderer.domElement.addEventListener("pointerup",()=>dragging=false);

/* Marker setzen */
let raycaster=new THREE.Raycaster();
let mouse=new THREE.Vector2();
let selectedLat=0;
let temp=15;
let simulationRunning=false;

renderer.domElement.addEventListener("click",e=>{
mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;
raycaster.setFromCamera(mouse,camera);
let hits=raycaster.intersectObject(earth);
if(hits.length>0){
let p=hits[0].point.clone().normalize();
marker.position.copy(p.multiplyScalar(1.01));
selectedLat=Math.asin(p.y)*180/Math.PI;
document.getElementById("lat").innerText=selectedLat.toFixed(1);
temp=15-0.2*Math.abs(selectedLat);
document.getElementById("temp").innerText=temp.toFixed(1);
}
});

/* Graph */
let gCanvas=document.getElementById("graph");
let gCtx=gCanvas.getContext("2d");
let data=[];

function drawGraph(){
gCtx.clearRect(0,0,300,150);
gCtx.strokeStyle="white";
gCtx.beginPath();
gCtx.moveTo(30,0); gCtx.lineTo(30,150); gCtx.stroke();
gCtx.beginPath();
gCtx.moveTo(30,149); gCtx.lineTo(300,149); gCtx.stroke();
for(let i=0;i<=5;i++){let y=30+i*24; gCtx.fillStyle="white"; gCtx.fillText((40-i*10)+"°C",0,y);}
gCtx.strokeStyle="red"; gCtx.beginPath();
for(let i=0;i<data.length;i++){
let x=30+i*2; let y=150-data[i]*3;
if(i==0) gCtx.moveTo(x,y); else gCtx.lineTo(x,y);
}
gCtx.stroke();
}

/* Weltraum */
let spaceCanvas=document.getElementById("space");
let sCtx=spaceCanvas.getContext("2d");
let sunAlive=true;
let planets=[
{r:20,a:0,s:0.05,c:"gray",vx:0,vy:0},
{r:35,a:0,s:0.04,c:"orange",vx:0,vy:0},
{r:50,a:0,s:0.03,c:"blue",vx:0,vy:0},
{r:70,a:0,s:0.025,c:"red",vx:0,vy:0},
{r:100,a:0,s:0.015,c:"#e2c290",vx:0,vy:0},
{r:130,a:0,s:0.012,c:"#f0d28a",vx:0,vy:0},
{r:160,a:0,s:0.01,c:"#7ec8e3",vx:0,vy:0},
{r:190,a:0,s:0.009,c:"#4169e1",vx:0,vy:0}
];

function drawSpace(){
sCtx.fillStyle="black"; sCtx.fillRect(0,0,320,220);
if(sunAlive){ sCtx.fillStyle="yellow"; sCtx.beginPath(); sCtx.arc(160,110,14,0,Math.PI*2); sCtx.fill();}
sCtx.strokeStyle="#333";
planets.forEach(p=>{sCtx.beginPath(); sCtx.arc(160,110,p.r,0,Math.PI*2); sCtx.stroke();});
planets.forEach(p=>{
if(sunAlive){p.a+=p.s; p.x=160+Math.cos(p.a)*p.r; p.y=110+Math.sin(p.a)*p.r; p.vx=Math.cos(p.a+Math.PI/2)*0.7; p.vy=Math.sin(p.a+Math.PI/2)*0.7;}
else {p.x+=p.vx; p.y+=p.vy;}
sCtx.fillStyle=p.c; sCtx.beginPath(); sCtx.arc(p.x,p.y,4,0,Math.PI*2); sCtx.fill();
});
requestAnimationFrame(drawSpace);
}
drawSpace();

/* Simulation */
function startSimulation(){simulationRunning=true; setTimeout(()=>{sunAlive=false;},2000);}
function resetSimulation(){simulationRunning=false; temp=15; data=[]; document.getElementById("temp").innerText=temp; sunAlive=true; planets.forEach(p=>{p.a=0;p.vx=0;p.vy=0;});}

/* Animation */
function animate(){
requestAnimationFrame(animate);
earth.rotation.y+=0.0005;
if(simulationRunning){
temp-=0.02;
document.getElementById("temp").innerText=temp.toFixed(1);
data.push(temp); if(data.length>130) data.shift();
drawGraph();
}
renderer.render(scene,camera);
}

animate();

/* Resize */
window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
