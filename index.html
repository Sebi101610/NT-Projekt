<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Erde Simulation</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#ui{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

button{
padding:10px 20px;
font-size:16px;
}

#graph{
position:absolute;
top:10px;
left:10px;
background:white;
border-radius:8px;
}

#info{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
}
</style>
</head>

<body>

<canvas id="graph" width="300" height="150"></canvas>

<div id="info">
Temperatur: <span id="temp">15</span> °C
</div>

<div id="ui">
<button onclick="startSimulation()">Start</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

/* SCENE */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 3;

/* RENDERER */

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* CONTROLS */

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

/* LICHT */

const light = new THREE.PointLight(0xffffff,1.2);
light.position.set(5,3,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

/* ERDE */

const loader = new THREE.TextureLoader();

const earthTexture = loader.load(
"https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
);

const geometry = new THREE.SphereGeometry(1,64,64);

const material = new THREE.MeshPhongMaterial({
map:earthTexture
});

const earth = new THREE.Mesh(geometry,material);
scene.add(earth);

/* MARKER */

const marker = new THREE.Mesh(
new THREE.SphereGeometry(0.02,16,16),
new THREE.MeshBasicMaterial({color:"red"})
);

scene.add(marker);

/* RAYCAST */

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener("click",(event)=>{

mouse.x = (event.clientX/window.innerWidth)*2-1;
mouse.y = -(event.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);

const hits = raycaster.intersectObject(earth);

if(hits.length>0){

const p = hits[0].point.clone().normalize();

marker.position.copy(p.multiplyScalar(1.01));

}

});

/* GRAPH */

const graphCanvas=document.getElementById("graph");
const g=graphCanvas.getContext("2d");

let data=[];
let temp=15;

function drawGraph(){

g.clearRect(0,0,300,150);

g.beginPath();

for(let i=0;i<data.length;i++){

let x=i*3;
let y=150-data[i];

if(i==0) g.moveTo(x,y);
else g.lineTo(x,y);

}

g.strokeStyle="red";
g.stroke();

}

/* SIMULATION */

let running=false;

window.startSimulation=function(){

running=true;

}

window.resetSimulation=function(){

running=false;
temp=15;
data=[];
document.getElementById("temp").innerText=temp;
g.clearRect(0,0,300,150);

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate);

controls.update();

earth.rotation.y += 0.0005;

if(running){

temp-=0.02;

document.getElementById("temp").innerText=temp.toFixed(1);

data.push(temp);

if(data.length>100) data.shift();

drawGraph();

}

renderer.render(scene,camera);

}

animate();

/* RESIZE */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
