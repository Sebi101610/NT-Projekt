<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earth Climate Simulation</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* Temperatur */
#tempDisplay{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:white;
  font-size:22px;
  z-index:10;
}

/* Graph */
#graph{
  position:absolute;
  top:20px;
  left:20px;
  width:300px;
  height:150px;
  background:rgba(0,0,0,0.6);
  border:1px solid white;
  z-index:10;
}

/* Protokoll */
#log{
  position:absolute;
  top:190px;
  left:20px;
  width:300px;
  height:220px;
  background:rgba(0,0,0,0.6);
  border:1px solid white;
  color:white;
  font-size:14px;
  overflow-y:auto;
  padding:5px;
  z-index:10;
}

/* Sonnensystem */
#solarSystem{
  position:absolute;
  top:20px;
  right:20px;
  width:320px;
  height:320px;
  border:1px solid white;
}

/* Buttons */
#controls{
  position:absolute;
  bottom:20px;
  right:20px;
  z-index:10;
}

button{
  padding:10px;
  margin:5px;
  font-size:14px;
}
</style>
</head>

<body>

<canvas id="graph"></canvas>
<div id="log"></div>
<div id="solarSystem"></div>

<div id="controls">
<button onclick="turnOffSun()">Sonne ausschalten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<div id="tempDisplay">Temperatur: -- °C</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ===== GLOBUS =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Licht
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

// Erde
const earthTexture = new THREE.TextureLoader().load(
  "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
);

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,64,64),
  new THREE.MeshPhongMaterial({map:earthTexture})
);
scene.add(earth);

// Marker
const marker = new THREE.Mesh(
  new THREE.SphereGeometry(0.03,16,16),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
earth.add(marker);
marker.visible=false;

// ===== GRAPH =====
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");
canvas.width=300;
canvas.height=150;
let temps=[];

function drawGraph(){
  ctx.clearRect(0,0,300,150);
  // Achsen
  ctx.strokeStyle="white";
  ctx.beginPath();
  ctx.moveTo(0,140); ctx.lineTo(300,140); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10,0); ctx.lineTo(10,150); ctx.stroke();
  // Linie
  ctx.beginPath();
  for(let i=0;i<temps.length;i++){
    let x = 10 + i*9;
    let y = 140 - temps[i]*3;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }
  ctx.strokeStyle="red";
  ctx.stroke();
}

// ===== PROTOKOLL =====
function logEvent(text){
  const log = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  log.innerHTML += "["+time+"] "+text+"<br>";
  log.scrollTop = log.scrollHeight;
}

// ===== WETTER =====
async function loadWeather(lat,lon){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`;
    const res = await fetch(url);
    const data = await res.json();
    const temp = data.current.temperature_2m;
    document.getElementById("tempDisplay").innerText = "Temperatur: "+temp+" °C";
    temps.push(temp);
    if(temps.length>30) temps.shift();
    drawGraph();
  }catch(e){
    document.getElementById("tempDisplay").innerText = "Temperatur konnte nicht geladen werden";
  }
}

// ===== MARKER KLICK =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(event)=>{
  mouse.x = (event.clientX/window.innerWidth)*2-1;
  mouse.y = -(event.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  let hit = raycaster.intersectObject(earth);
  if(hit.length>0){
    const p = earth.worldToLocal(hit[0].point.clone());
    marker.position.copy(p.normalize().multiplyScalar(1.02));
    marker.visible=true;
    const lat = Math.asin(p.y)*(180/Math.PI);
    const lon = Math.atan2(p.z,p.x)*(180/Math.PI);
    loadWeather(lat,lon);
  }
});

// ===== GLOBUS DREHEN =====
let dragging=false, px=0, py=0;
window.addEventListener("mousedown",(e)=>{dragging=true; px=e.clientX; py=e.clientY;});
window.addEventListener("mouseup",()=>dragging=false);
window.addEventListener("mousemove",(e)=>{
  if(!dragging) return;
  earth.rotation.y += (e.clientX-px)*0.005;
  earth.rotation.x += (e.clientY-py)*0.005;
  px=e.clientX; py=e.clientY;
});

// ===== SONNENSYSTEM =====
const solarScene = new THREE.Scene();
const solarCamera = new THREE.PerspectiveCamera(60,1,0.1,1000);
solarCamera.position.z=10;
const solarRenderer = new THREE.WebGLRenderer();
solarRenderer.setSize(320,320);
document.getElementById("solarSystem").appendChild(solarRenderer.domElement);

let sun = new THREE.Mesh(new THREE.SphereGeometry(1,32,32), new THREE.MeshBasicMaterial({color:0xffff00}));
solarScene.add(sun);

let earthOrbit = new THREE.Mesh(new THREE.SphereGeometry(0.3,16,16), new THREE.MeshBasicMaterial({color:0x00aaff}));
solarScene.add(earthOrbit);

let orbitRadius=4, angle=0;
let sunOn=true;

function turnOffSun(){
  if(!sunOn) return;
  sunOn=false;
  solarScene.remove(sun);
  logEvent("Sonne ausgeschaltet");
  setTimeout(()=>logEvent("Temperaturen beginnen zu fallen"),3000);
  setTimeout(()=>logEvent("Erste Pflanzen sterben"),10000);
  setTimeout(()=>logEvent("Ozeane beginnen zu gefrieren"),20000);
}

function resetSimulation(){
  location.reload();
}

// ===== ANIMATION =====
function animate(){
  requestAnimationFrame(animate);
  earth.rotation.y += 0.0005;
  angle += 0.01;
  earthOrbit.position.x = Math.cos(angle)*orbitRadius;
  earthOrbit.position.z = Math.sin(angle)*orbitRadius;
  solarRenderer.render(solarScene,solarCamera);
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
