<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonne verschwindet Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
color:white;
}

/* Globus */

#globe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* Graph */

#chartContainer{
position:absolute;
top:10px;
left:10px;
width:320px;
height:200px;
background:#000c;
padding:10px;
border-radius:10px;
}

/* Weltraum */

#space{
position:absolute;
top:10px;
right:10px;
width:320px;
height:200px;
border-radius:10px;
}

/* Buttons */

#controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}

button{
padding:12px 20px;
font-size:16px;
margin:5px;
border:none;
border-radius:8px;
background:#1e88e5;
color:white;
}

button:hover{
background:#1565c0;
cursor:pointer;
}

</style>
</head>

<body>

<div id="globe"></div>

<div id="chartContainer">
<canvas id="chart"></canvas>
</div>

<canvas id="space"></canvas>

<div id="controls">
<button onclick="startSimulation()">Simulation starten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<script>

/* -------------------------
GLOBUS
--------------------------*/

let scene,camera,renderer,earth,marker;
let selectedPoint=null;

const container=document.getElementById("globe");

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=2.5;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);

container.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

const loader=new THREE.TextureLoader();

/* 8K Erde */

const earthTexture=loader.load(
"https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/earthmap1k.jpg"
);

const geometry=new THREE.SphereGeometry(1,128,128);

const material=new THREE.MeshPhongMaterial({
map:earthTexture
});

earth=new THREE.Mesh(geometry,material);
scene.add(earth);

marker=new THREE.Mesh(
new THREE.SphereGeometry(0.03,16,16),
new THREE.MeshBasicMaterial({color:0xff0000})
);

scene.add(marker);

/* Globus drehen */

let dragging=false;
let lastX;

renderer.domElement.addEventListener("pointerdown",(e)=>{
dragging=true;
lastX=e.clientX;
});

renderer.domElement.addEventListener("pointermove",(e)=>{

if(!dragging) return;

let dx=e.clientX-lastX;

earth.rotation.y+=dx*0.005;

lastX=e.clientX;

});

renderer.domElement.addEventListener("pointerup",()=>dragging=false);

/* Klick auf Globus */

renderer.domElement.addEventListener("click",(event)=>{

const rect=renderer.domElement.getBoundingClientRect();

const mouse=new THREE.Vector2(
((event.clientX-rect.left)/rect.width)*2-1,
-((event.clientY-rect.top)/rect.height)*2+1
);

const raycaster=new THREE.Raycaster();
raycaster.setFromCamera(mouse,camera);

const hit=raycaster.intersectObject(earth);

if(hit.length>0){

selectedPoint=hit[0].point;

marker.position.copy(
selectedPoint.clone().normalize().multiplyScalar(1.02)
);

}

});

function animate(){

requestAnimationFrame(animate);

earth.rotation.y+=0.0005;

renderer.render(scene,camera);

}

animate();

/* -------------------------
GRAPH
--------------------------*/

let chart;

function startSimulation(){

let labels=[];
let temps=[];

let temp=15;

for(let day=0;day<50;day++){

temp-=1.2;

labels.push(day);
temps.push(temp);

}

const ctx=document.getElementById("chart");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Temperatur °C",
data:temps,
borderColor:"cyan",
tension:0.2
}]
},
options:{
plugins:{
legend:{labels:{color:"white"}}
},
scales:{
x:{ticks:{color:"white"}},
y:{ticks:{color:"white"}}
}
}
});

}

/* -------------------------
RESET
--------------------------*/

function resetSimulation(){
location.reload();
}

/* -------------------------
SONNENSYSTEM
--------------------------*/

const spaceCanvas=document.getElementById("space");
const ctx=spaceCanvas.getContext("2d");

spaceCanvas.width=320;
spaceCanvas.height=200;

let angle=0;

function drawSpace(){

ctx.fillStyle="black";
ctx.fillRect(0,0,320,200);

/* Sonne */

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(160,100,15,0,Math.PI*2);
ctx.fill();

/* Umlaufbahnen */

ctx.strokeStyle="#444";

ctx.beginPath();
ctx.arc(160,100,30,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.arc(160,100,50,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.arc(160,100,70,0,Math.PI*2);
ctx.stroke();

ctx.beginPath();
ctx.arc(160,100,90,0,Math.PI*2);
ctx.stroke();

/* Planeten */

drawPlanet(30,angle,4,"gray");   // Merkur
drawPlanet(50,angle*0.7,6,"orange"); // Venus
drawPlanet(70,angle*0.5,6,"blue");   // Erde
drawPlanet(90,angle*0.4,5,"red");    // Mars

angle+=0.02;

requestAnimationFrame(drawSpace);

}

function drawPlanet(radius,angle,size,color){

const x=160+Math.cos(angle)*radius;
const y=100+Math.sin(angle)*radius;

ctx.fillStyle=color;
ctx.beginPath();
ctx.arc(x,y,size,0,Math.PI*2);
ctx.fill();

}

drawSpace();

</script>

</body>
</html>
