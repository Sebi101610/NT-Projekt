<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Globus Simulation</title>
<style>
body {
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}
#ui {
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,0.8);
    color:white;
    padding:15px;
    border-radius:10px;
    z-index:10;
}
canvas {
    display:block;
}
</style>
</head>
<body>

<div id="ui">
<h2>🌞 Sonne verschwindet</h2>
<input type="range" min="0" max="365" value="0" id="slider">
<p>Tage: <span id="days">0</span></p>
<p>Ø Temperatur: <span id="temp">15</span> °C</p>
<p id="status">Normale Bedingungen</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rotation = 0;

const slider = document.getElementById("slider");
const daysEl = document.getElementById("days");
const tempEl = document.getElementById("temp");
const status = document.getElementById("status");

function calculateTemp(days){
    if(days===0) return 15;
    if(days<=7) return 15 - (days*4.5);
    if(days<=30) return -17 - ((days-7)*1);
    return -40 - ((days-30)*0.1);
}

function drawEarth(temp){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    let centerX = canvas.width/2;
    let centerY = canvas.height/2;
    let radius = 200;

    // Farbänderung je nach Temperatur
    let color = "#2e8b57";
    if(temp < 0) color = "#8b4513";
    if(temp < -20) color = "#cccccc";
    if(temp < -50) color = "#ffffff";

    // 3D-Shading Effekt
    let gradient = ctx.createRadialGradient(
        centerX-50, centerY-50, 50,
        centerX, centerY, radius
    );
    gradient.addColorStop(0, "white");
    gradient.addColorStop(1, color);

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI*2);
    ctx.fill();

    // einfache Kontinente (Fake)
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.ellipse(centerX+Math.sin(rotation)*50, centerY-40, 60, 40, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(centerX-80*Math.sin(rotation), centerY+50, 80, 50, 0, 0, Math.PI*2);
    ctx.fill();
}

slider.addEventListener("input", function(){
    let days = parseInt(slider.value);
    daysEl.textContent = days;

    let temp = calculateTemp(days);
    tempEl.textContent = temp.toFixed(1);

    if(days===0) status.textContent="Normale Ökosysteme.";
    else if(days<7) status.textContent="Photosynthese stoppt.";
    else if(days<30) status.textContent="Massives Artensterben.";
    else if(days<180) status.textContent="Ozeane frieren.";
    else status.textContent="Nahe globale Vereisung.";
});

function animate(){
    rotation += 0.01;
    let temp = calculateTemp(parseInt(slider.value));
    drawEarth(temp);
    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
