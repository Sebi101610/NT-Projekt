<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Offline Globus Simulation</title>
<style>
body { margin:0; background:black; overflow:hidden; font-family:Arial; }
#ui {
  position:absolute; top:20px; left:20px;
  background:rgba(0,0,0,0.8); color:white; padding:15px;
  border-radius:10px; z-index:10; width:280px;
}
canvas { display:block; }
</style>
</head>
<body>

<div id="ui">
<h2>🌞 Sonne verschwindet</h2>
<input type="range" min="0" max="365" value="0" id="slider">
<p>Tage: <span id="days">0</span></p>
<p>Ø Temperatur: <span id="temp">15</span> °C</p>
<p id="status">Normale Bedingungen</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rotation = 0;
let isDragging = false;
let lastX = 0;

const slider = document.getElementById("slider");
const daysEl = document.getElementById("days");
const tempEl = document.getElementById("temp");
const status = document.getElementById("status");

function calculateTemp(days){
  if(days===0) return 15;
  if(days<=7) return 15 - (days*4.5);
  if(days<=30) return -17 - ((days-7)*1);
  return -40 - ((days-30)*0.1);
}

function drawEarth(temp){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cx = canvas.width/2;
  const cy = canvas.height/2;
  const radius = 200;

  // Globus Hintergrund (blau für Ozeane)
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI*2);
  ctx.fillStyle = "#1E90FF"; 
  ctx.fill();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);

  // einfache Kontinente (grüne Ellipsen)
  ctx.fillStyle = temp>=0 ? "#228B22" : "#8B4513"; // braun wenn kalt
  ctx.beginPath();
  ctx.ellipse(0, -50, 70, 40, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(-80, 50, 80, 50, 0, 0, Math.PI*2);
  ctx.fill();

  // Städte
  ctx.fillStyle = "#FFD700";
  ctx.beginPath();
  ctx.arc(20,0,5,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(-40,-20,4,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  // Eis overlay
  if(temp < 0){
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fill();
  }
  if(temp < -30){
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fill();
  }

  // Verdunkelung
  const darkness = slider.value/365;
  ctx.fillStyle = `rgba(0,0,0,${darkness})`;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI*2);
  ctx.fill();
}

slider.addEventListener("input", ()=>{
  const days = parseInt(slider.value);
  daysEl.textContent = days;
  const temp = calculateTemp(days);
  tempEl.textContent = temp.toFixed(1);

  if(days===0) status.textContent="Normale Ökosysteme.";
  else if(days<7) status.textContent="Photosynthese stoppt.";
  else if(days<30) status.textContent="Massives Artensterben.";
  else if(days<180) status.textContent="Ozeane frieren.";
  else status.textContent="Nahe globale Vereisung.";
});

canvas.addEventListener("mousedown", e=>{
  isDragging = true; lastX = e.clientX;
});
canvas.addEventListener("mouseup", ()=>{ isDragging=false; });
canvas.addEventListener("mousemove", e=>{
  if(isDragging){ 
    rotation += (e.clientX-lastX)*0.005;
    lastX = e.clientX;
  }
});

function animate(){
  const temp = calculateTemp(parseInt(slider.value));
  drawEarth(temp);
  requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
