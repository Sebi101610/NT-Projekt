<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sonne verschwindet – Simulation</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#globe{
width:100%;
height:60vh;
}

#chart{
height:30vh;
background:#111;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
}

button{
padding:8px 12px;
font-size:14px;
margin-right:5px;
}

#space{
position:absolute;
top:0;
right:0;
width:200px;
height:120px;
background:black;
border-left:2px solid #333;
border-bottom:2px solid #333;
}

</style>
</head>

<body>

<div id="ui">
<button onclick="startSimulation()">Simulation starten</button>
<button onclick="resetSimulation()">Reset</button>
</div>

<canvas id="space"></canvas>

<div id="globe"></div>

<canvas id="chart"></canvas>

<script>

let scene,camera,renderer,earth,marker;
let rotationSpeed=0.002;

init();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/(window.innerHeight*0.6),
0.1,
1000
);

camera.position.z=3;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight*0.6);
document.getElementById("globe").appendChild(renderer.domElement);

let light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,3,5);
scene.add(light);

let ambient=new THREE.AmbientLight(0x888888);
scene.add(ambient);

let textureLoader=new THREE.TextureLoader();

let earthTexture=textureLoader.load(
"https://threejsfundamentals.org/threejs/resources/images/earth-day.jpg"
);

let geometry=new THREE.SphereGeometry(1,64,64);

let material=new THREE.MeshPhongMaterial({
map:earthTexture
});

earth=new THREE.Mesh(geometry,material);

scene.add(earth);

let markerGeometry=new THREE.SphereGeometry(0.02,16,16);

let markerMaterial=new THREE.MeshBasicMaterial({
color:0xff0000
});

marker=new THREE.Mesh(markerGeometry,markerMaterial);

scene.add(marker);

animate();

}

function animate(){

requestAnimationFrame(animate);

earth.rotation.y+=rotationSpeed;

renderer.render(scene,camera);

}

let dragging=false;
let lastX;

renderer?.domElement?.addEventListener?.("pointerdown",(e)=>{
dragging=true;
lastX=e.clientX;
});

renderer?.domElement?.addEventListener?.("pointermove",(e)=>{
if(!dragging)return;

let dx=e.clientX-lastX;

earth.rotation.y+=dx*0.005;

lastX=e.clientX;
});

renderer?.domElement?.addEventListener?.("pointerup",()=>dragging=false);

renderer?.domElement?.addEventListener?.("pointerleave",()=>dragging=false);

renderer?.domElement?.addEventListener?.("click",onGlobeClick);

function onGlobeClick(event){

let rect=renderer.domElement.getBoundingClientRect();

let mouse=new THREE.Vector2(
((event.clientX-rect.left)/rect.width)*2-1,
-((event.clientY-rect.top)/rect.height)*2+1
);

let raycaster=new THREE.Raycaster();

raycaster.setFromCamera(mouse,camera);

let intersects=raycaster.intersectObject(earth);

if(intersects.length>0){

let point=intersects[0].point;

marker.position.copy(point.clone().normalize().multiplyScalar(1.02));

selectedPoint=point.clone();

}

}

let selectedPoint=null;

let chart;

function startSimulation(){

if(!selectedPoint)return;

let temps=[];

let labels=[];

let temp=15;

for(let day=0;day<30;day++){

temp-=1.5+Math.random()*0.5;

temps.push(temp);

labels.push("Tag "+day);

}

drawChart(labels,temps);

startSpaceAnimation();

}

function drawChart(labels,data){

let ctx=document.getElementById("chart").getContext("2d");

if(chart)chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Temperatur °C",
data:data,
borderColor:"cyan",
fill:false
}]
},
options:{
scales:{
y:{
beginAtZero:false
}
}
}
});

}

function resetSimulation(){

marker.position.set(0,0,0);

if(chart)chart.destroy();

}

function startSpaceAnimation(){

let canvas=document.getElementById("space");

let ctx=canvas.getContext("2d");

canvas.width=200;
canvas.height=120;

let sunVisible=true;

setInterval(()=>{

ctx.fillStyle="black";
ctx.fillRect(0,0,200,120);

if(sunVisible){

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(100,60,20,0,Math.PI*2);
ctx.fill();

}else{

ctx.fillStyle="white";

for(let i=0;i<20;i++){

ctx.fillRect(
Math.random()*200,
Math.random()*120,
2,
2
);

}

}

sunVisible=false;

},1000);

}

</script>

</body>
</html>
