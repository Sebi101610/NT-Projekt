<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Earth Climate Simulator</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#tempDisplay{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:22px;
}

#graph{
position:absolute;
top:20px;
left:20px;
width:300px;
height:150px;
background:rgba(0,0,0,0.5);
}

#spaceSim{
position:absolute;
top:20px;
right:20px;
width:320px;
height:320px;
}

</style>
</head>

<body>

<canvas id="graph"></canvas>
<div id="spaceSim"></div>
<div id="tempDisplay">Temperatur: -- °C</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="script.js"></script>

</body>
</html>
