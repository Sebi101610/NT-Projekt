<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realistische Erde</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script>

// Szene
let scene = new THREE.Scene();

// Kamera
let camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3;

// Renderer (höhere Qualität!)
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Steuerung
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// 🌍 Bessere Erdtextur
let loader = new THREE.TextureLoader();

let earthTexture = loader.load(
  "https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/earthmap1k.jpg",
  function(texture){
    texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
    texture.minFilter = THREE.LinearMipMapLinearFilter;
    texture.magFilter = THREE.LinearFilter;
  }
);

let earthGeometry = new THREE.SphereGeometry(1, 128, 128);
let earthMaterial = new THREE.MeshPhongMaterial({
  map: earthTexture
});
let earth = new THREE.Mesh(earthGeometry, earthMaterial);
scene.add(earth);

// Atmosphäre Glow
let atmosphereGeometry = new THREE.SphereGeometry(1.05, 128, 128);
let atmosphereMaterial = new THREE.MeshBasicMaterial({
  color: 0x3399ff,
  transparent: true,
  opacity: 0.2
});
let atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
scene.add(atmosphere);

// Licht
let ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambientLight);

let sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
sunLight.position.set(5, 0, 5);
scene.add(sunLight);

// Sichtbare Sonne
let sunGeometry = new THREE.SphereGeometry(0.3, 32, 32);
let sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
let sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
sunMesh.position.set(5, 0, 5);
scene.add(sunMesh);

// Sterne
let starGeometry = new THREE.BufferGeometry();
let starVertices = [];
for(let i=0;i<2000;i++){
  starVertices.push(
    THREE.MathUtils.randFloatSpread(300),
    THREE.MathUtils.randFloatSpread(300),
    THREE.MathUtils.randFloatSpread(300)
  );
}
starGeometry.setAttribute(
  'position',
  new THREE.Float32BufferAttribute(starVertices,3)
);
let starMaterial = new THREE.PointsMaterial({color:0xffffff});
let stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Sonne Button
let sunGone = false;

window.addEventListener("keydown", function(e){
  if(e.key === "s"){
    sunGone = !sunGone;
    if(sunGone){
      sunLight.intensity = 0;
      sunMesh.visible = false;
    } else {
      sunLight.intensity = 1.5;
      sunMesh.visible = true;
    }
  }
});

// Animation
function animate(){
  requestAnimationFrame(animate);

  earth.rotation.y += 0.0015;
  atmosphere.rotation.y += 0.0015;

  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener("resize", function(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
