<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Stabile Klimasimulation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial }
#panel { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.85); padding:15px; border-radius:10px; width:320px; }
button { margin:3px; padding:6px 10px; background:orange; border:none; border-radius:5px }
canvas { background:white; border-radius:8px; margin-top:10px; }
</style>
</head>
<body>
<div id="panel">
<h3>🌍 Stabile Klimasimulation</h3>
<div id="status"></div>
<button onclick="running=true">Start</button>
<button onclick="running=false">Pause</button>
<button onclick="resetSim()">Reset</button>
<button onclick="exportCSV()">CSV Export</button>
<canvas id="chart" width="320" height="150"></canvas>
</div>

<script>
const ZONES = 36;
let zones = [];
let day = 0;
let running = false;
let history = [];

// --- Three.js Globus ---
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
let controls = new THREE.OrbitControls(camera, renderer.domElement);

let geometry = new THREE.SphereGeometry(5, 180, 180);
let material = new THREE.MeshPhongMaterial({vertexColors:true});
let earth = new THREE.Mesh(geometry, material);
scene.add(earth);

let light = new THREE.PointLight(0xffffff, 1.2);
light.position.set(10, 10, 10);
scene.add(light);

camera.position.z = 12;

// --- Klimadaten ---
function resetSim(){
    zones = [];
    history = [];
    day = 0;
    for(let i=0;i<ZONES;i++){
        let phi=Math.abs(i/(ZONES-1)-0.5)*2;
        zones.push({
            temp: 288 - phi*40,
            vegetation: 1-phi*0.5,
            ice: 0
        });
    }
    updateSurface();
    updateChart();
}
resetSim();

// --- Physik (vereinfacht) ---
function stepPhysics(){
    let newTemps = [];
    for(let i=0;i<ZONES;i++){
        let z=zones[i];
        let dT=-0.01; // konstante Abkühlung pro Schritt
        let diffusion=0;
        if(i>0) diffusion += 0.01*(zones[i-1].temp - z.temp);
        if(i<ZONES-1) diffusion += 0.01*(zones[i+1].temp - z.temp);
        newTemps[i] = z.temp + dT + diffusion;
    }
    for(let i=0;i<ZONES;i++){
        let z=zones[i];
        z.temp = newTemps[i];
        if(z.temp < 273){ z.ice = Math.min(1, z.ice+0.01); }
        if(z.temp < 275){ z.vegetation = Math.max(0, z.vegetation-0.01); }
    }
}

// --- Globus Update ---
function updateSurface(){
    let colors = [];
    let pos = geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
        let y = pos.getY(i);
        let latNorm = (y/5+1)/2;
        let zoneIndex = Math.floor(latNorm*(ZONES-1));
        let z = zones[zoneIndex];
        let color = new THREE.Color();
        if(z.vegetation>0.4) color.setRGB(0.1*z.vegetation,0.6*z.vegetation,0.1);
        else if(z.ice>0.3) color.setRGB(1,1,1);
        else color.setRGB(0.5,0.3,0.1);
        colors.push(color.r,color.g,color.b);
    }
    geometry.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
    geometry.attributes.color.needsUpdate=true;
}

// --- Chart ---
let ctx = document.getElementById("chart");
let chart = new Chart(ctx,{
    type:'line',
    data:{labels:[], datasets:[{label:'Globale Mitteltemperatur °C', data:[], borderColor:'red', tension:0.2}]},
    options:{animation:false, scales:{y:{min:-50,max:30}}}
});

function updateChart(){
    let meanTemp = zones.reduce((a,b)=>a+b.temp,0)/ZONES - 273;
    chart.data.labels.push(Math.floor(day));
    chart.data.datasets[0].data.push(meanTemp);
    chart.update();
    history.push({day:Math.floor(day), temp:meanTemp});
}

function exportCSV(){
    let csv="Tag,Temperatur\n";
    history.forEach(r=>{ csv+=r.day+","+r.temp+"\n"; });
    let blob=new Blob([csv],{type:"text/csv"});
    let a=document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download="klimasimulation.csv";
    a.click();
}

// --- Animation ---
function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y += 0.0005;
    controls.update();
    if(running){
        day += 0.2;
        stepPhysics();
        updateSurface();
        if(Math.floor(day)%5===0) updateChart();
    }
    let meanTemp = zones.reduce((a,b)=>a.temp,0)/ZONES-273;
    document.getElementById("status").innerHTML = 
        "Tag "+Math.floor(day)+"<br>"+
        "Globale Mitteltemperatur: "+meanTemp.toFixed(1)+" °C";
    renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
