<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>High-End Klimasimulation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:Arial }
#panel { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.85); padding:15px; border-radius:10px; width:320px; }
button { margin:3px; padding:6px 10px; background:orange; border:none; border-radius:5px }
canvas { background:white; border-radius:8px; margin-top:10px; }
</style>
</head>
<body>
<div id="panel">
<h3>🌍 High-End Klimasimulation</h3>
<div id="status"></div>
<button onclick="running=true">Start</button>
<button onclick="running=false">Pause</button>
<button onclick="resetSim()">Reset</button>
<button onclick="exportCSV()">CSV Export</button>
<canvas id="chart" width="300" height="150"></canvas>
</div>

<script>
// --- Konstanten ---
const sigma = 5.67e-8;
const D = 0.25;
const ZONES = 36;

// --- Three.js Setup ---
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
let controls = new THREE.OrbitControls(camera, renderer.domElement);

let geometry = new THREE.SphereGeometry(5, 180, 180);
let material = new THREE.MeshPhongMaterial({vertexColors:true});
let earth = new THREE.Mesh(geometry, material);
scene.add(earth);

let light = new THREE.PointLight(0xffffff,1.2);
light.position.set(10,10,10);
scene.add(light);

camera.position.z = 12;

// --- Klimadaten ---
let zones = [];
let running = false;
let day = 0;
let history = [];

function resetSim(){
    zones = [];
    history = [];
    day = 0;
    for(let i=0;i<ZONES;i++){
        let phi = Math.abs(i/(ZONES-1)-0.5)*2;
        let T0 = 288 - phi*40; // Starttemperatur

        let Csurf = (phi>0.7) ? 2e7 : (Math.random()<0.15?2e6: (Math.random()<0.5?1e7:4e7));
        let Cdeep = Csurf*4;
        let Catm = 1e6;

        zones.push({
            Tsurf:T0,
            Tdeep:T0,
            Tatm:T0,
            Csurf:Csurf,
            Cdeep:Cdeep,
            Catm:Catm,
            vegetation:1-phi*0.5,
            ice:0
        });
    }
    updateSurface();
    updateChart();
}

// --- Physik ---
function stepPhysics(){
    let newSurf = [], newDeep = [], newAtm = [];
    for(let i=0;i<ZONES;i++){
        let z = zones[i];

        // Oberflächenverlust
        let dTsurf = -(sigma*Math.pow(z.Tsurf,4))/z.Csurf;

        // Wärmetransport
        let diffusion=0;
        if(i>0) diffusion += D*(zones[i-1].Tsurf - z.Tsurf);
        if(i<ZONES-1) diffusion += D*(zones[i+1].Tsurf - z.Tsurf);

        // Zwei-Schichten-Ozean
        let k = 0.01;
        let dTdeep = k*(z.Tsurf - z.Tdeep)/z.Cdeep;
        dTsurf += dTdeep;

        // Atmosphärenmodell
        let epsilon = 0.3;
        let dTatm = (sigma*Math.pow(z.Tsurf,4) - 2*sigma*Math.pow(z.Tatm,4))/z.Catm;

        newSurf[i] = z.Tsurf + (dTsurf*30000 + diffusion);
        newDeep[i] = z.Tdeep + dTdeep*30000;
        newAtm[i] = z.Tatm + dTatm*30000;
    }

    for(let i=0;i<ZONES;i++){
        zones[i].Tsurf = newSurf[i];
        zones[i].Tdeep = newDeep[i];
        zones[i].Tatm = newAtm[i];

        if(zones[i].Tsurf<273){ zones[i].ice +=0.003; if(zones[i].ice>1) zones[i].ice=1; }
        if(zones[i].Tsurf<275){ zones[i].vegetation -=0.001; if(zones[i].vegetation<0) zones[i].vegetation=0; }
    }
}

// --- Globus Update ---
function updateSurface(){
    let colors = [];
    let pos = geometry.attributes.position;
    for(let i=0;i<pos.count;i++){
        let y=pos.getY(i);
        let latNorm = (y/5+1)/2;
        let zoneIndex = Math.floor(latNorm*(ZONES-1));
        let z = zones[zoneIndex];
        let color = new THREE.Color();
        let tempC = z.Tsurf-273;

        if(z.vegetation>0.4) color.setRGB(0.1*z.vegetation,0.6*z.vegetation,0.1);
        else if(z.ice>0.3) color.setRGB(1*z.ice,1*z.ice,1);
        else if(tempC<-5) color.setRGB(0.7,0.7,0.85);
        else color.setRGB(0.5,0.3,0.1);

        colors.push(color.r,color.g,color.b);
    }
    geometry.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
    geometry.attributes.color.needsUpdate=true;
}

// --- Chart ---
let ctx = document.getElementById("chart");
let chart = new Chart(ctx,{
    type:'line',
    data:{labels:[], datasets:[{label:'Globale Mitteltemperatur °C', data:[], borderColor:'red', tension:0.2}]},
    options:{animation:false, scales:{y:{min:-200, max:20}}}
});

function updateChart(){
    let meanTemp = zones.reduce((a,b)=>a+b.Tsurf,0)/ZONES - 273;
    chart.data.labels.push(Math.floor(day));
    chart.data.datasets[0].data.push(meanTemp);
    chart.update();
    history.push({day:Math.floor(day),temp:meanTemp});
}

// CSV Export
function exportCSV(){
    let csv = "Tag,Temperatur\n";
    history.forEach(r=>{ csv+=r.day+","+r.temp+"\n"; });
    let blob = new Blob([csv],{type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download="klimasimulation.csv";
    a.click();
}

// --- Animation ---
function animate(){
    requestAnimationFrame(animate);
    earth.rotation.y += 0.0004;
    controls.update();

    if(running){
        day +=0.2;
        stepPhysics();
        updateSurface();
        if(Math.floor(day)%5===0) updateChart();
        light.intensity *=0.9997;
    }

    let meanTemp = zones.reduce((a,b)=>a+b.Tsurf,0)/ZONES-273;
    document.getElementById("status").innerHTML=
        "Tag "+Math.floor(day)+"<br>"+
        "Globale Mitteltemperatur: "+meanTemp.toFixed(1)+" °C";

    renderer.render(scene,camera);
}

animate();
</script>
</body>
</html>
